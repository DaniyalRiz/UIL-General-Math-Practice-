<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const TOPICS = ["All Topics","Column 1","Column 2","Column 3","Algebra 1 & 2","Geometry","Precalculus","AP Calculus","AP Statistics"];

const getColumnCategory = (q) => {
  const topic = typeof q === 'string' ? q : q.topic;
  if (topic === "Algebra 1 & 2" || topic === "Geometry") return "Column 1";
  if (topic === "Precalculus") return "Column 2";
  if (topic === "AP Calculus" || topic === "AP Statistics") return "Column 3";
  return null;
};

const DIFFICULTIES = ["All Difficulties","Easy","Medium","Hard"];
const PAGE_SIZE = 15;

// difficulty pill colors (light + dark)
const DIFF_PILL = {
  Easy:   "bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400",
  Medium: "bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400",
  Hard:   "bg-rose-100 text-rose-700 dark:bg-rose-500/15 dark:text-rose-400",
};
const TOPIC_DOT = {
  "Algebra 1 & 2":"bg-violet-500","Geometry":"bg-sky-500","Precalculus":"bg-emerald-500",
  "AP Calculus":"bg-amber-500","AP Statistics":"bg-rose-500",
};
const TOPIC_BAR = TOPIC_DOT;

const fmtTime = ms => {
  const s = Math.round(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
};

const sourceDisplay = (q) => {
  if (!q) return "";
  const source = q.source || q.original_test || "";
  const problemNumber =
    q.original_question_number ||
    q.answer_key_source?.problem_number ||
    q.problem_number ||
    null;
  return source && problemNumber ? `${source} • Problem ${problemNumber}` : source;
};

// Strip \(...\) and \[...\] delimiters for plain-text row previews
const plainText = (s) => String(s||"")
  .replace(/\\\[([\s\S]*?)\\\]/g, (_,m)=>m.trim())
  .replace(/\\\(([\s\S]*?)\\\)/g, (_,m)=>m.trim())
  .replace(/\s+/g," ").trim();

// ── Math rendering ────────────────────────────────────────────────────────────
// Renders text containing LaTeX. Use $...$ for inline math and $$...$$ for display.
// Falls back to plain text if KaTeX hasn't loaded.
function MathText({ text, className }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (!window.katex) { el.textContent = text; return; }
    // Split on \[...\] (display) and \(...\) (inline). Money uses a plain $, which
    // we leave untouched so it never collides with math.
    const parts = String(text).split(/(\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
    el.innerHTML = "";
    parts.forEach(part => {
      if (!part) return;
      const display = part.startsWith("\\[") && part.endsWith("\\]");
      const inline = part.startsWith("\\(") && part.endsWith("\\)");
      if (display || inline) {
        const tex = part.slice(2, part.length - 2);
        const span = document.createElement("span");
        try {
          window.katex.render(tex, span, { displayMode: display, throwOnError: false });
        } catch(e) { span.textContent = tex; }
        el.appendChild(span);
      } else {
        el.appendChild(document.createTextNode(part));
      }
    });
  }, [text]);
  return <span ref={ref} className={className}>{text}</span>;
}

// ── localStorage hook (JSON-backed, survives refresh on this device) ──────────
function useLocalStorage(key, initial) {
  const [value, setValue] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : initial;
    } catch(e) { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e){}
  }, [key, value]);
  return [value, setValue];
}

// ── Theme hook (persists to localStorage) ────────────────────────────────────
function useTheme() {
  const [dark, setDark] = useState(() => {
    try {
      const saved = localStorage.getItem("uilmath-theme");
      if (saved) return saved === "dark";
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    } catch(e) { return false; }
  });
  useEffect(() => {
    const root = document.documentElement;
    if (dark) root.classList.add("dark"); else root.classList.remove("dark");
    try { localStorage.setItem("uilmath-theme", dark ? "dark" : "light"); } catch(e){}
  }, [dark]);
  return [dark, () => setDark(d => !d)];
}

function useTimer() {
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  const start = () => { if (!ref.current) ref.current = setInterval(() => setElapsed(e => e + 1), 1000); };
  const stop  = () => { clearInterval(ref.current); ref.current = null; };
  const reset = () => { stop(); setElapsed(0); };
  useEffect(() => () => clearInterval(ref.current), []);
  return { elapsed, fmt: `${String(Math.floor(elapsed/60)).padStart(2,"0")}:${String(elapsed%60).padStart(2,"0")}`, start, stop, reset };
}

function DiffPill({ d }) {
  return <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold ${DIFF_PILL[d]||""}`}>{d}</span>;
}

// ── Icons ────────────────────────────────────────────────────────────────────
const SunIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>);
const MoonIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>);

// ── Problem list (row layout) ────────────────────────────────────────────────
function ProblemRow({ q, n, status, onOpen }) {
  return (
    <button onClick={onOpen}
      className="group w-full grid grid-cols-[2.5rem_1fr_auto] sm:grid-cols-[3rem_1fr_9rem_7rem_11rem_7rem] items-center gap-3 px-4 py-3 text-left
                 border-b border-slate-100 dark:border-slate-800
                 hover:bg-slate-50 dark:hover:bg-slate-900/60 transition-colors">
      <div className="flex items-center gap-2">
        <span className="text-xs font-mono text-slate-400 dark:text-slate-600 w-6 text-right">{n}</span>
        {status === "correct" && <span className="text-emerald-500 text-sm">●</span>}
        {status === "wrong" && <span className="text-rose-500 text-sm">●</span>}
      </div>
      <div className="min-w-0">
        <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400">
          {q.title || plainText(q.question)}
        </p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 truncate hidden sm:block">{plainText(q.question)}</p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 sm:hidden">{q.topic} · {q.difficulty}</p>
      </div>
      <div className="hidden sm:flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
        <span className={`w-2 h-2 rounded-full ${TOPIC_DOT[q.topic]||"bg-slate-400"}`}></span>{q.topic}
      </div>
      <div className="hidden sm:block"><DiffPill d={q.difficulty} /></div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">{sourceDisplay(q)}</div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">
        {q.date_added ? new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : "—"}
      </div>
    </button>
  );
}

// ── Single problem modal/view ────────────────────────────────────────────────
// ── SimilarProblem: self-contained mini-quiz for AI-generated problems ────────
// ── Similar question recommender ─────────────────────────────────────────────
function getSimilarQuestions(current, allQuestions, answeredIds = []) {
  const others = allQuestions.filter(q => q.id !== current.id);
  const scored = others.map(q => {
    let score = 0;
    // Tag overlap (highest weight — same pattern)
    const sharedTags = (current.tags || []).filter(t => (q.tags || []).includes(t));
    score += sharedTags.length * 10;
    // Same topic
    if (q.topic === current.topic) score += 4;
    // Same difficulty
    if (q.difficulty === current.difficulty) score += 2;
    // Penalise already-answered questions (prefer unseen)
    if (answeredIds.includes(q.id)) score -= 5;
    return { q, score, sharedTags };
  });
  // Sort by score desc, then shuffle ties so it's not always the same 3
  scored.sort((a, b) => b.score - a.score || Math.random() - 0.5);
  return scored.slice(0, 3).map(s => ({ ...s.q, sharedTags: s.sharedTags }));
}


function ReportIssueModal({ q, authUser, onClose }) {
  const ISSUE_TYPES = ['Wrong answer','Wrong explanation','Typo','Image missing','Formatting issue','Other'];
  const [issueType, setIssueType] = useState('Wrong answer');
  const [details, setDetails] = useState('');
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState('');

  const submitReport = async () => {
    if (!authUser) {
      setMessage('Please sign in to report an issue.');
      return;
    }
    setSaving(true);
    setMessage('');
    const { error } = await _supabase.from('question_reports').insert({
      user_id: authUser.id,
      question_id: q.id,
      issue_type: issueType,
      details: details.trim() || null,
    });
    setSaving(false);
    if (error) {
      setMessage(error.message || 'Could not submit report.');
      return;
    }
    setMessage('Report submitted. Thanks for helping improve the question bank.');
    setDetails('');
    setTimeout(onClose, 900);
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
      <div className="relative z-10 w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-2xl p-5"
        onClick={e => e.stopPropagation()}>
        <div className="flex items-start justify-between gap-4 mb-4">
          <div>
            <h2 className="font-display text-xl font-black text-slate-900 dark:text-white">Report Question Issue</h2>
            <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{q.title || 'Question #' + q.id}</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-lg text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 text-xl">×</button>
        </div>

        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Issue type</label>
        <select value={issueType} onChange={e=>setIssueType(e.target.value)}
          className="w-full mb-4 px-3 py-2 rounded-lg border bg-white border-slate-200 text-slate-700 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
          {ISSUE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
        </select>

        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Details</label>
        <textarea value={details} onChange={e=>setDetails(e.target.value)}
          placeholder="Briefly explain the issue. Example: answer key says C but calculation gives B."
          rows={4}
          className="w-full px-3 py-2 rounded-lg border bg-white border-slate-200 text-slate-700 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-600 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

        {message && <p className={`mt-3 text-sm ${message.startsWith('Report submitted') ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}`}>{message}</p>}

        <div className="mt-5 flex justify-end gap-2">
          <button onClick={onClose}
            className="px-4 py-2 rounded-lg text-sm font-semibold border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
            Cancel
          </button>
          <button onClick={submitReport} disabled={saving || !authUser}
            className={`px-4 py-2 rounded-lg text-sm font-semibold ${authUser && !saving ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-400 cursor-not-allowed'}`}>
            {!authUser ? 'Sign in required' : saving ? 'Submitting…' : 'Submit Report'}
          </button>
        </div>
      </div>
    </div>
  );
}


function CommunitySolutions({ q, authUser }) {
  const [open, setOpen] = useState(false);
  const [solutions, setSolutions] = useState([]);
  const [votes, setVotes] = useState([]);
  const [sortBy, setSortBy] = useState('Most Upvotes');
  const [text, setText] = useState('');
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState('');

  const loadSolutions = async () => {
    if (!authUser || !q?.id) return;
    const { data } = await _supabase
      .from('community_solutions_with_votes')
      .select('*')
      .eq('question_id', q.id);
    setSolutions(data || []);

    const ids = (data || []).map(s => s.id);
    if (ids.length) {
      const { data: voteRows } = await _supabase
        .from('community_solution_votes')
        .select('solution_id')
        .eq('user_id', authUser.id)
        .in('solution_id', ids);
      setVotes((voteRows || []).map(v => v.solution_id));
    } else {
      setVotes([]);
    }
  };

  useEffect(() => {
    if (open) loadSolutions();
  }, [open, q.id, authUser?.id]);

  const sorted = [...solutions].sort((a,b) => {
    if (sortBy === 'Most Recent') return new Date(b.created_at) - new Date(a.created_at);
    if (sortBy === 'Oldest First') return new Date(a.created_at) - new Date(b.created_at);
    return (b.upvotes || 0) - (a.upvotes || 0) || new Date(b.created_at) - new Date(a.created_at);
  });

  const saveSolution = async () => {
    if (!authUser) {
      setMessage('Please sign in to post a solution.');
      return;
    }
    if (!text.trim()) return;
    setSaving(true);
    setMessage('');
    const { error } = await _supabase.from('community_solutions').insert({
      user_id: authUser.id,
      question_id: q.id,
      solution_text: text.trim(),
      display_name: authUser.user_metadata?.display_name || authUser.email?.split('@')[0] || 'User',
    });
    setSaving(false);
    if (error) {
      setMessage(error.message || 'Could not post solution.');
      return;
    }
    setText('');
    setMessage('Solution posted.');
    await loadSolutions();
  };

  const toggleVote = async (solutionId) => {
    if (!authUser) return;
    const already = votes.includes(solutionId);
    if (already) {
      await _supabase.from('community_solution_votes')
        .delete()
        .eq('user_id', authUser.id)
        .eq('solution_id', solutionId);
    } else {
      await _supabase.from('community_solution_votes').insert({
        user_id: authUser.id,
        solution_id: solutionId,
      });
    }
    await loadSolutions();
  };

  return (
    <div className="mx-6 mb-5 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden">
      <button onClick={()=>setOpen(o=>!o)}
        className="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-colors">
        <div className="text-left">
          <p className="text-sm font-bold text-slate-800 dark:text-slate-100">Community Solutions</p>
          <p className="text-xs text-slate-500 dark:text-slate-400">View and share alternate methods. LaTeX works with \\( ... \\) and \\[ ... \\].</p>
        </div>
        <span className="text-sm font-semibold text-blue-600 dark:text-blue-400">{open ? 'Hide' : 'Show'}</span>
      </button>

      {open && (
        <div className="border-t border-slate-200 dark:border-slate-800 p-4 space-y-4">
          {!authUser ? (
            <p className="text-sm text-slate-500 dark:text-slate-400"><a href="./index.html" className="text-blue-600 dark:text-blue-400 hover:underline">Sign in</a> to view or post community solutions.</p>
          ) : (
            <>
              <div className="flex flex-wrap items-center justify-between gap-2">
                <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">{solutions.length} solution{solutions.length!==1?'s':''}</p>
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                  className="px-3 py-1.5 rounded-lg text-xs font-semibold border bg-white border-slate-200 text-slate-700 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-200">
                  <option>Most Upvotes</option>
                  <option>Most Recent</option>
                  <option>Oldest First</option>
                </select>
              </div>

              <div className="space-y-3">
                {sorted.length === 0 ? (
                  <p className="text-sm text-slate-400 dark:text-slate-500 py-4 text-center">No community solutions yet. Be the first to add one.</p>
                ) : sorted.map(s => (
                  <div key={s.id} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950/50 p-3">
                    <div className="flex items-start gap-3">
                      <button onClick={()=>toggleVote(s.id)}
                        className={`shrink-0 px-2 py-1 rounded-lg text-xs font-bold border transition-colors ${votes.includes(s.id) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-blue-400'}`}>
                        ▲ {s.upvotes || 0}
                      </button>
                      <div className="flex-1 min-w-0">
                        <p className="text-xs text-slate-400 dark:text-slate-500 mb-1">
                          {s.display_name || 'User'} · {new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                        </p>
                        <p className="text-sm text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">
                          <MathText text={s.solution_text} />
                        </p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="pt-2 border-t border-slate-200 dark:border-slate-800">
                <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Add your solution</p>
                <textarea value={text} onChange={e=>setText(e.target.value)}
                  placeholder="Type your solution or shortcut. Use \\(x^2\\), \\frac{a}{b}, \\sqrt{x}, etc. for math."
                  rows={4}
                  className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                <div className="mt-2 flex items-center justify-between gap-2">
                  <p className="text-xs text-slate-400 dark:text-slate-500">Tip: write math as <code>\\(x^2+1\\)</code>.</p>
                  <button onClick={saveSolution} disabled={saving || !text.trim()}
                    className={`px-4 py-2 rounded-lg text-xs font-semibold ${text.trim() && !saving ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-400 cursor-not-allowed'}`}>
                    {saving ? 'Posting…' : 'Post Solution'}
                  </button>
                </div>
                {message && <p className={`mt-2 text-xs ${message.includes('posted') ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}`}>{message}</p>}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function ProblemView({ q, onClose, onAnswered, prevAnswer, stat, onPrev, onNext, hasPrev, hasNext, isBookmarked, onToggleBookmark, authUser, allQuestions, answeredIds, onOpenQuestion }) {
  const [pending, setPending]   = useState(null);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [crossed, setCrossed]   = useState({});
  // Notes state
  const [notes, setNotes]       = useState([]);
  const [noteText, setNoteText] = useState("");
  const [notesSaving, setNotesSaving] = useState(false);
  const [attemptSessionId, setAttemptSessionId] = useState(null);
  const [submitError, setSubmitError] = useState("");
  const [serverResult, setServerResult] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [showReportIssue, setShowReportIssue] = useState(false);
  const timer = useTimer();
  const startRef = useRef(Date.now());

  // Load notes for this question when it opens
  useEffect(() => {
    setPending(null);
    setSelected(null);
    setAnswered(false);
    setCrossed({});
    setNoteText("");
    setAttemptSessionId(null);
    setSubmitError("");
    setServerResult(null);
    setSubmitting(false);
    timer.reset();
    timer.start(); startRef.current = Date.now();

    // Create a one-use backend attempt session for this opened question.
    if (authUser) {
      _supabase.rpc("start_question_attempt", { p_question_id: q.id })
        .then(({ data, error }) => {
          if (error) {
            console.warn("start_question_attempt error:", error.message);
            setSubmitError(error.message);
          } else {
            setAttemptSessionId(data);
          }
        });
    }

    // Fetch notes from Supabase
    if (authUser) {
      _supabase.from('notes')
        .select('*')
        .eq('user_id', authUser.id)
        .eq('question_id', q.id)
        .order('created_at', { ascending: true })
        .then(({ data }) => setNotes(data || []));
    } else {
      setNotes([]);
    }
  }, [q.id]);

  const saveNote = async () => {
    if (!noteText.trim() || !authUser) return;
    setNotesSaving(true);
    const { data, error } = await _supabase.from('notes').insert({
      user_id: authUser.id,
      question_id: q.id,
      note_text: noteText.trim(),
    }).select();
    if (!error && data) {
      setNotes(prev => [...prev, data[0]]);
      setNoteText("");
    }
    setNotesSaving(false);
  };

  const deleteNote = async (noteId) => {
    await _supabase.from('notes').delete().eq('id', noteId);
    setNotes(prev => prev.filter(n => n.id !== noteId));
  };

  // Left-click: select/deselect a choice (pending, not yet submitted)
  const handlePick = (choice) => {
    if (answered) return;
    setPending(p => p === choice ? null : choice);
  };

  // Right-click: cross out / un-cross a choice
  const handleCross = (e, choice) => {
    e.preventDefault();
    if (answered) return;
    setCrossed(prev => ({ ...prev, [choice]: !prev[choice] }));
  };

  // Submit button handler — answer checking happens securely in Supabase.
  const handleSubmit = async () => {
    if (answered || !pending || submitting) return;

    if (!authUser) {
      setSubmitError("Please sign in to submit answers securely.");
      return;
    }

    if (!attemptSessionId) {
      setSubmitError("Question session is not ready yet. Wait a moment and try again.");
      return;
    }

    const timeMs = Date.now() - startRef.current;
    setSubmitting(true);
    setSubmitError("");

    const { data, error } = await _supabase.rpc("submit_answer", {
      p_session_id: attemptSessionId,
      p_question_id: q.id,
      p_selected_answer: pending,
      p_time_taken_ms: timeMs,
    });

    setSubmitting(false);

    if (error) {
      setSubmitError(error.message || "Could not submit answer.");
      return;
    }

    const result = Array.isArray(data) ? data[0] : data;
    if (!result) {
      setSubmitError("No result returned from Supabase.");
      return;
    }

    setSelected(pending);
    setAnswered(true);
    timer.stop();
    setServerResult(result);

    onAnswered && onAnswered({
      questionId:    q.id,
      questionTitle: q.title || null,
      questionText:  q.question || null,
      topic:         q.topic,
      difficulty:    q.difficulty,
      selected:      pending,
      correctAnswer: result.correct_answer,
      correct:       !!result.is_correct,
      timeMs,
      explanation:   result.explanation || null,
      tags:          q.tags || [],
    });
  };

  const correctAnswer = serverResult?.correct_answer || prevAnswer?.correctAnswer || null;
  const explanationText = serverResult?.explanation || prevAnswer?.explanation || null;
  const hasServerResult = answered && !!correctAnswer;

  const choiceClass = (choice) => {
    const isCrossed = crossed[choice] && !answered;
    if (!answered) {
      if (pending === choice) return "border-blue-500 bg-blue-50 dark:bg-blue-500/10 dark:border-blue-400 cursor-pointer";
      if (isCrossed) return "border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-900/50 opacity-40 cursor-pointer";
      return "border-slate-200 bg-white hover:border-blue-300 hover:bg-blue-50/50 cursor-pointer dark:border-slate-700 dark:bg-slate-900 dark:hover:border-blue-600 dark:hover:bg-slate-800";
    }
    if (hasServerResult && choice === correctAnswer) return "border-emerald-400 bg-emerald-50 text-emerald-800 dark:border-emerald-500/50 dark:bg-emerald-500/10 dark:text-emerald-300";
    if (choice === selected && choice !== q.answer) return "border-rose-400 bg-rose-50 text-rose-800 dark:border-rose-500/50 dark:bg-rose-500/10 dark:text-rose-300";
    return "border-slate-200 bg-slate-50 text-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-600";
  };
  const isCorrect = answered && selected === correctAnswer;

  // compute similar questions once
  const similarQuestions = React.useMemo(() => {
    const pool = allQuestions.length > 0 ? allQuestions : [];
    if (pool.length <= 1) return [];
    const others = pool.filter(x => x.id !== q.id);
    const scored = others.map(x => {
      let score = 0;
      const sharedTags = (q.tags || []).filter(t => (x.tags || []).includes(t));
      score += sharedTags.length * 10;
      if (x.topic === q.topic) score += 4;
      if (x.difficulty === q.difficulty) score += 2;
      return { x, score, sharedTags };
    });
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 3).map(s => ({ ...s.x, sharedTags: s.sharedTags }));
  }, [q.id, allQuestions]);

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-white dark:bg-slate-950 overflow-hidden">
      <div className={`flex-1 w-full max-w-7xl mx-auto flex flex-col ${answered ? "overflow-y-auto" : "overflow-hidden"}`}>

        {/* ── header ── */}
        <div className="border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-950 z-10 shadow-sm dark:shadow-slate-900">
          <div className="flex items-center justify-between px-5 pt-3 pb-3 gap-3">

            {/* Left: topic + diff + source + date */}
            <div className="flex items-center gap-2 flex-wrap min-w-0">
              <span className="flex items-center gap-1.5 text-sm font-semibold text-slate-700 dark:text-slate-200">
                <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${TOPIC_DOT[q.topic]}`}></span>
                {q.topic}
              </span>
              <DiffPill d={q.difficulty} />
              {q.source && (
                <span className="hidden sm:inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-xs font-semibold border border-slate-200 dark:border-slate-700">
                  📄 {sourceDisplay(q)}
                </span>
              )}
              {q.date_added && (
                <span className="hidden md:inline text-xs font-medium text-slate-500 dark:text-slate-400 whitespace-nowrap">
                  Added {new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                </span>
              )}
            </div>

            {/* Right: timer + bookmark + close */}
            <div className="flex items-center gap-2 flex-shrink-0">
              {/* Timer — large and prominent */}
              <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg border font-mono text-sm font-bold tabular-nums transition-colors
                ${answered
                  ? "bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500"
                  : "bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/40 text-blue-700 dark:text-blue-300"}`}>
                <svg className="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                  <path strokeLinecap="round" strokeWidth="2" d="M12 6v6l4 2"/>
                </svg>
                {timer.fmt}
              </div>
              <button onClick={()=>setShowReportIssue(true)} title="Report a question issue"
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold border bg-slate-50 border-slate-200 text-slate-600 hover:border-rose-300 hover:text-rose-600 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:border-rose-500 dark:hover:text-rose-400 transition-all">
                <span>⚑</span>
                <span className="hidden sm:inline">Report Issue</span>
              </button>
              <button onClick={onToggleBookmark} title={isBookmarked ? "Remove bookmark" : "Bookmark for review"}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold border transition-all
                  ${isBookmarked
                    ? "bg-amber-50 border-amber-300 text-amber-700 dark:bg-amber-500/15 dark:border-amber-500/40 dark:text-amber-400"
                    : "bg-slate-50 border-slate-200 text-slate-600 hover:border-amber-300 hover:text-amber-600 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:border-amber-500 dark:hover:text-amber-400"}`}>
                <span>🔖</span>
                <span className="hidden sm:inline">{isBookmarked ? "Saved" : "Review later"}</span>
              </button>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 text-xl leading-none transition-colors">×</button>
            </div>
          </div>

          {/* Title row */}
          {q.title && (
            <div className="px-5 pb-3">
              <h2 className="font-display text-xl font-black text-slate-900 dark:text-white tracking-tight">{q.title}</h2>
            </div>
          )}
        </div>

        {/* ── two-column body after answering, single column before ── */}
        <div className={answered ? "flex flex-col lg:flex-row flex-1 min-h-0" : "flex flex-col flex-1"}>

          {/* ── LEFT column: question + choices + explanation + tags ── */}
          <div className={answered ? "lg:flex-1 lg:min-w-0 flex flex-col" : "flex flex-col"}>

            {/* ── question ── */}
            <div className="px-6 pt-5 pb-4">
              <p className="text-slate-800 dark:text-slate-100 font-medium text-base leading-relaxed whitespace-pre-line">
                <MathText text={q.question} />
              </p>
              {q.image && (
                <div className="mt-4 flex justify-center">
                  <img src={q.image} alt="Figure for problem"
                    className="max-w-full sm:max-w-md rounded-xl border border-slate-200 dark:border-slate-700 bg-white" />
                </div>
              )}
            </div>

            {/* ── hint ── */}
            {!answered && (
              <p className="px-6 pb-2 text-xs text-slate-400 dark:text-slate-500">
                Click to select · Right-click to cross out · Press <kbd className="px-1 py-0.5 rounded bg-slate-100 dark:bg-slate-800 font-mono text-[10px]">Submit</kbd> to check
              </p>
            )}

            {/* ── choices ── */}
            <div className="px-6 pb-4 grid gap-2.5">
              {q.choices.map((choice, i) => (
                <button key={i}
                  onClick={() => handlePick(choice)}
                  onContextMenu={(e) => handleCross(e, choice)}
                  className={`w-full text-left px-4 py-3 rounded-xl border-2 text-sm font-medium transition-all duration-150 flex items-center gap-3 select-none ${choiceClass(choice)}`}>
                  <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs shrink-0 font-black relative transition-all
                    ${answered && choice === correctAnswer
                      ? "bg-emerald-500 text-white border-2 border-emerald-500"
                      : answered && choice === selected && choice !== q.answer
                        ? "bg-rose-500 text-white border-2 border-rose-500"
                        : pending === choice && !answered
                          ? "bg-blue-500 text-white border-2 border-blue-500"
                          : "border-2 border-slate-300 dark:border-slate-600 text-slate-400 dark:text-slate-500"}
                    ${crossed[choice] && !answered ? "opacity-30" : ""}`}>
                    {String.fromCharCode(65+i)}
                    {crossed[choice] && !answered && (
                      <span className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span className="w-full h-0.5 bg-current rotate-45 absolute"></span>
                      </span>
                    )}
                  </span>
                  <span className={crossed[choice] && !answered ? "line-through opacity-50" : ""}>
                    <MathText text={choice.replace(/^\([A-E]\)\s*/, '')} />
                  </span>
                  {!answered && crossed[choice] && (
                    <span className="ml-auto text-slate-400 text-xs">✕</span>
                  )}
                  {answered && choice===correctAnswer && <span className="ml-auto text-emerald-600 dark:text-emerald-400 font-bold text-base">✓</span>}
                  {answered && choice===selected && choice!==q.answer && <span className="ml-auto text-rose-500 font-bold text-base">✗</span>}
                </button>
              ))}
            </div>

            {/* ── submit button (pre-answer) ── */}
            {!answered && (
              <div className="px-6 pb-5">
                {submitError && (
                  <p className="mb-2 text-sm text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/30 rounded-lg px-3 py-2">
                    {submitError}
                  </p>
                )}
                <button onClick={handleSubmit} disabled={!pending || submitting || !authUser}
                  className={`w-full py-3 rounded-xl text-sm font-bold transition-all
                    ${pending && !submitting && authUser
                      ? "bg-blue-600 hover:bg-blue-700 text-white shadow-sm"
                      : "bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed"}`}>
                  {!authUser ? "Sign in to submit securely" : submitting ? "Submitting…" : pending ? "Submit Answer" : "Select an answer first"}
                </button>
              </div>
            )}

            {/* ── explanation (post-answer) ── */}
            {answered && (
              <div className={`mx-6 mb-5 rounded-xl p-4 border text-sm
                ${isCorrect ? "bg-emerald-50 border-emerald-200 dark:bg-emerald-500/10 dark:border-emerald-500/30"
                            : "bg-rose-50 border-rose-200 dark:bg-rose-500/10 dark:border-rose-500/30"}`}>
                <p className={`font-semibold mb-1.5 ${isCorrect ? "text-emerald-700 dark:text-emerald-300" : "text-rose-700 dark:text-rose-300"}`}>
                  {isCorrect ? "✓ Correct!" : `✗ Incorrect — Correct: ${correctAnswer}`}{` · Time: ${timer.fmt}`}
                </p>
                <p className="text-slate-700 dark:text-slate-300 leading-relaxed"><MathText text={explanationText || ""} /></p>
              </div>
            )}

            {answered && <CommunitySolutions q={q} authUser={authUser} />}

            {/* ── tags ── */}
            <div className="px-6 pb-4 flex flex-wrap gap-1.5">
              {q.tags.map(t => <span key={t} className="text-xs px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-full">#{t}</span>)}
            </div>

            {/* on mobile, show sidebar sections inline after answering */}
            {answered && (
              <div className="lg:hidden flex flex-col gap-4 px-6 pb-4">
                {/* History */}
                {stat && stat.attempts > 0 && (
                  <div className="rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 py-3">
                    <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Your history on this problem</p>
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <div>
                        <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{Math.round(100*stat.correct/stat.attempts)}%</p>
                        <p className="text-[11px] text-slate-400 dark:text-slate-500">{stat.correct}/{stat.attempts} correct</p>
                      </div>
                      <div>
                        <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.bestMs)}</p>
                        <p className="text-[11px] text-slate-400 dark:text-slate-500">best time</p>
                      </div>
                      <div>
                        <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.lastMs)}</p>
                        <p className="text-[11px] text-slate-400 dark:text-slate-500">last time</p>
                      </div>
                    </div>
                  </div>
                )}
                {/* Notes mobile */}
                <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 overflow-hidden">
                  <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">
                    <span className="text-base">📝</span>
                    <p className="text-sm font-bold text-slate-700 dark:text-slate-200">My Notes</p>
                    {!authUser && <span className="ml-auto text-xs text-slate-400 dark:text-slate-500">Sign in to save notes</span>}
                  </div>
                  {notes.length > 0 && (
                    <div className="divide-y divide-slate-200 dark:divide-slate-800">
                      {notes.map(n => (
                        <div key={n.id} className="px-4 py-3 flex items-start gap-3 group">
                          <div className="flex-1">
                            <p className="text-sm text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">{n.note_text}</p>
                            <p className="text-xs text-slate-400 dark:text-slate-600 mt-1">{new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
                          </div>
                          <button onClick={()=>deleteNote(n.id)} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 transition-all text-lg leading-none shrink-0 mt-0.5">×</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {authUser ? (
                    <div className="px-4 py-3">
                      <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                        onKeyDown={e=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) saveNote(); }}
                        placeholder="Add a note for this problem… (Cmd+Enter to save)" rows={2}
                        className="w-full text-sm px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      <button onClick={saveNote} disabled={!noteText.trim() || notesSaving}
                        className={`mt-2 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors ${noteText.trim() ? "bg-blue-600 hover:bg-blue-700 text-white" : "bg-slate-100 dark:bg-slate-800 text-slate-400 cursor-not-allowed"}`}>
                        {notesSaving ? "Saving…" : "Save Note"}
                      </button>
                    </div>
                  ) : (
                    <div className="px-4 py-3">
                      <p className="text-xs text-slate-400 dark:text-slate-500"><a href="./index.html" className="text-blue-500 hover:underline">Sign in</a> to add and save notes.</p>
                    </div>
                  )}
                </div>
                {/* Similar mobile */}
                {similarQuestions.length > 0 && (
                  <div className="rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div className="px-4 py-3 bg-slate-50 dark:bg-slate-900/60 border-b border-slate-200 dark:border-slate-800">
                      <p className="text-sm font-bold text-slate-700 dark:text-slate-200">Practice Similar Problems</p>
                      <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5">Build speed by drilling the same question pattern.</p>
                    </div>
                    <div className="divide-y divide-slate-100 dark:divide-slate-800">
                      {similarQuestions.map(sq => (
                        <div key={sq.id} className="px-4 py-3 flex items-center gap-4 hover:bg-slate-50 dark:hover:bg-slate-900/40 transition-colors">
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate">{sq.title || plainText(sq.question)}</p>
                            <div className="flex items-center gap-2 mt-1 flex-wrap">
                              <span className={`w-1.5 h-1.5 rounded-full ${TOPIC_DOT[sq.topic]||"bg-slate-400"}`}></span>
                              <span className="text-xs text-slate-500 dark:text-slate-400">{sq.topic}</span>
                              <DiffPill d={sq.difficulty} />
                              {sq.sharedTags && sq.sharedTags.slice(0,2).map(t =>
                                <span key={t} className="text-xs px-1.5 py-0.5 bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 rounded-full">#{t}</span>
                              )}
                            </div>
                          </div>
                          <button onClick={()=>onOpenQuestion(sq.id)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-colors">Open</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>{/* end left column */}

          {/* ── RIGHT sidebar: only on desktop, only after answering ── */}
          {answered && (
            <div className="hidden lg:flex flex-col gap-4 w-80 xl:w-96 shrink-0 border-l border-slate-100 dark:border-slate-800 px-5 pt-5 pb-4 overflow-y-auto">

              {/* 1. History */}
              {stat && stat.attempts > 0 && (
                <div className="rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 py-3">
                  <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Your history on this problem</p>
                  <div className="grid grid-cols-3 gap-2 text-center">
                    <div>
                      <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{Math.round(100*stat.correct/stat.attempts)}%</p>
                      <p className="text-[11px] text-slate-400 dark:text-slate-500">{stat.correct}/{stat.attempts} correct</p>
                    </div>
                    <div>
                      <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.bestMs)}</p>
                      <p className="text-[11px] text-slate-400 dark:text-slate-500">best time</p>
                    </div>
                    <div>
                      <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.lastMs)}</p>
                      <p className="text-[11px] text-slate-400 dark:text-slate-500">last time</p>
                    </div>
                  </div>
                </div>
              )}

              {/* 2. Notes */}
              <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60 overflow-hidden">
                <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">

function csvEscape(value) {
  const s = String(value ?? '');
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function downloadCsv(filename, rows) {
  const csv = rows.map(row => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ANALYTICS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function AnalyticsPage({ authUser }) {
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]   = useState(null);

  useEffect(() => {
    if (!authUser) { setLoading(false); return; }
    setLoading(true);
    _supabase
      .from('attempts')
      .select('topic,difficulty,is_correct,time_taken_ms,created_at')
      .eq('user_id', authUser.id)
      .order('created_at', { ascending: false })
      .then(({ data: rows, error: err }) => {
        if (err) { setError(err.message); setLoading(false); return; }
        setData(rows || []);
        setLoading(false);
      });
  }, [authUser]);

  if (!authUser) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📊</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">Analytics</p>
      <p className="text-slate-500 dark:text-slate-400 mb-6">Sign in to see your personal performance analytics.</p>
      <a href="./index.html" className="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors">Sign In</a>
    </div>
  );

  if (loading) return (
    <div className="flex items-center justify-center py-32">
      <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  );

  if (error) return (
    <div className="max-w-6xl mx-auto px-4 py-12 text-center">
      <p className="text-rose-500 font-semibold">Error loading analytics: {error}</p>
      <p className="text-slate-400 text-sm mt-1">Make sure the attempts table exists in Supabase.</p>
    </div>
  );

  if (!data || data.length === 0) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📊</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">No data yet</p>
      <p className="text-slate-500 dark:text-slate-400">Answer some problems and your analytics will appear here.</p>
    </div>
  );

  // ── compute stats ──────────────────────────────────────────────────────────
  const total      = data.length;
  const correct    = data.filter(r => r.is_correct).length;
  const accuracy   = total ? Math.round(100 * correct / total) : 0;
  const totalMs    = data.reduce((s, r) => s + (r.time_taken_ms || 0), 0);
  const avgMs      = total ? Math.round(totalMs / total) : 0;

  // by topic
  const topicMap = {};
  data.forEach(r => {
    if (!topicMap[r.topic]) topicMap[r.topic] = { attempts:0, correct:0, totalMs:0 };
    topicMap[r.topic].attempts++;
    if (r.is_correct) topicMap[r.topic].correct++;
    topicMap[r.topic].totalMs += r.time_taken_ms || 0;
  });
  const byTopic = Object.entries(topicMap).map(([topic, v]) => ({
    topic, attempts: v.attempts, correct: v.correct,
    accuracy: Math.round(100 * v.correct / v.attempts),
    avgMs: Math.round(v.totalMs / v.attempts),
  })).sort((a,b) => b.attempts - a.attempts);

  // by difficulty
  const diffMap = {};
  data.forEach(r => {
    if (!diffMap[r.difficulty]) diffMap[r.difficulty] = { attempts:0, correct:0, totalMs:0 };
    diffMap[r.difficulty].attempts++;
    if (r.is_correct) diffMap[r.difficulty].correct++;
    diffMap[r.difficulty].totalMs += r.time_taken_ms || 0;
  });
  const byDiff = ['Easy','Medium','Hard'].map(d => {
    const v = diffMap[d] || { attempts:0, correct:0, totalMs:0 };
    return { difficulty:d, attempts:v.attempts, correct:v.correct,
      accuracy: v.attempts ? Math.round(100 * v.correct / v.attempts) : 0,
      avgMs: v.attempts ? Math.round(v.totalMs / v.attempts) : 0 };
  });

  // by UIL column
  const columnMap = {};
  data.forEach(r => {
    const column = getColumnCategory(r);
    if (!column) return;
    if (!columnMap[column]) columnMap[column] = { attempts:0, correct:0, totalMs:0 };
    columnMap[column].attempts++;
    if (r.is_correct) columnMap[column].correct++;
    columnMap[column].totalMs += r.time_taken_ms || 0;
  });
  const byColumn = ['Column 1','Column 2','Column 3'].map(column => {
    const v = columnMap[column] || { attempts:0, correct:0, totalMs:0 };
    return { column, attempts:v.attempts, correct:v.correct,
      accuracy: v.attempts ? Math.round(100 * v.correct / v.attempts) : 0,
      avgMs: v.attempts ? Math.round(v.totalMs / v.attempts) : 0 };
  });

  // insights
  const topicsWithData = byTopic.filter(t => t.attempts > 0);
  const strongest = topicsWithData.length ? topicsWithData.reduce((a,b) => a.accuracy>=b.accuracy?a:b) : null;
  const weakest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.accuracy<=b.accuracy?a:b) : null;
  const fastest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.avgMs<=b.avgMs?a:b) : null;
  const slowest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.avgMs>=b.avgMs?a:b) : null;

  // streak
  const days = [...new Set(data.map(r => new Date(r.created_at).toDateString()))];
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (days.includes(d.toDateString())) streak++;
    else if (i > 0) break;
  }

  const DIFF_BAR = { Easy:'bg-emerald-500', Medium:'bg-amber-500', Hard:'bg-rose-500' };
  const COLUMN_BAR = { 'Column 1':'bg-blue-500', 'Column 2':'bg-violet-500', 'Column 3':'bg-fuchsia-500' };

  const exportAnalyticsPdf = () => {
    const jsPDF = window.jspdf?.jsPDF;
    if (!jsPDF) {
      alert('PDF exporter is still loading. Please try again in a few seconds.');
      return;
    }

    const doc = new jsPDF();
    let y = 18;
    const line = (text, size = 10, bold = false) => {
      doc.setFont('helvetica', bold ? 'bold' : 'normal');
      doc.setFontSize(size);
      const wrapped = doc.splitTextToSize(String(text), 180);
      wrapped.forEach(part => {
        if (y > 280) { doc.addPage(); y = 18; }
        doc.text(part, 14, y);
        y += size * 0.45 + 3;
      });
    };
    const spacer = (n = 4) => { y += n; };

    line('UIL Math Practice Analytics Report', 18, true);
    line('Exported: ' + new Date().toLocaleString(), 9);
    spacer();

    line('Summary', 13, true);
    line(`Total Attempts: ${total}`);
    line(`Correct: ${correct}`);
    line(`Accuracy: ${accuracy}%`);
    line(`Average Time: ${fmtTime(avgMs)}`);
    line(`Total Time: ${fmtTime(totalMs)}`);
    line(`Day Streak: ${streak}`);
    spacer();

    line('Performance by Column', 13, true);
    byColumn.forEach(c => line(`${c.column}: ${c.correct}/${c.attempts} correct · ${c.accuracy}% · avg ${fmtTime(c.avgMs)}`));
    spacer();

    line('Performance by Topic', 13, true);
    byTopic.forEach(t => line(`${t.topic}: ${t.correct}/${t.attempts} correct · ${t.accuracy}% · avg ${fmtTime(t.avgMs)}`));
    spacer();

    line('Performance by Difficulty', 13, true);
    byDiff.forEach(d => line(`${d.difficulty}: ${d.correct}/${d.attempts} correct · ${d.accuracy}% · avg ${fmtTime(d.avgMs)}`));
    spacer();

    line('Recent Attempts', 13, true);
    data.slice(0, 50).forEach(r => {
      line(`${new Date(r.created_at).toLocaleDateString()} · ${r.is_correct ? 'Correct' : 'Incorrect'} · ${fmtTime(r.time_taken_ms || 0)} · ${r.question_title || 'Question #' + r.question_id}`, 9);
    });

    doc.save('uil-math-analytics.pdf');
  };

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <div className="mb-6 flex items-start justify-between gap-4">
        <div>
          <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">Analytics</h1>
          <p className="text-slate-500 dark:text-slate-400 text-sm">Your personal performance across all practice sessions</p>
        </div>
        <button onClick={exportAnalyticsPdf}
          className="shrink-0 px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-colors">
          Export PDF
        </button>
      </div>

      {/* ── Summary Cards ── */}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
        {[
          { label:'Attempted',      value: total,           color:'text-blue-600 dark:text-blue-400' },
          { label:'Correct',        value: correct,         color:'text-emerald-600 dark:text-emerald-400' },
          { label:'Accuracy',       value: accuracy + '%',  color: accuracy>=70?'text-emerald-600 dark:text-emerald-400':accuracy>=50?'text-amber-600 dark:text-amber-400':'text-rose-600 dark:text-rose-400' },
          { label:'Avg Time',       value: fmtTime(avgMs),  color:'text-slate-800 dark:text-slate-100' },
          { label:'Total Time',     value: fmtTime(totalMs),color:'text-slate-800 dark:text-slate-100' },
          { label:'Day Streak',     value: streak + (streak===1?' day':' days'), color:'text-amber-600 dark:text-amber-400' },
        ].map(({ label, value, color }) => (
          <div key={label} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 text-center shadow-sm">
            <p className={`text-2xl font-black ${color}`}>{value}</p>
            <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium uppercase tracking-wide">{label}</p>
          </div>
        ))}
      </div>

      {/* ── Insights row ── */}
      {topicsWithData.length > 1 && (
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
          {[
            { emoji:'💪', label:'Strongest Topic', value: strongest?.topic, sub: strongest?.accuracy + '% accuracy' },
            { emoji:'📈', label:'Needs Work',       value: weakest?.topic,   sub: weakest?.accuracy + '% accuracy' },
            { emoji:'⚡', label:'Fastest Topic',    value: fastest?.topic,   sub: fmtTime(fastest?.avgMs) + ' avg' },
            { emoji:'🐢', label:'Slowest Topic',    value: slowest?.topic,   sub: fmtTime(slowest?.avgMs) + ' avg' },
          ].map(({ emoji, label, value, sub }) => (
            <div key={label} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 shadow-sm">
              <p className="text-2xl mb-1">{emoji}</p>
              <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-1">{label}</p>
              <p className="text-sm font-bold text-slate-800 dark:text-slate-100 leading-tight">{value || '—'}</p>
              <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{sub}</p>
            </div>
          ))}
        </div>
      )}

      <div className="grid lg:grid-cols-2 gap-6">
        {/* ── By Topic ── */}
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6">
          <h2 className="font-bold text-slate-800 dark:text-slate-100 mb-5">Performance by Topic</h2>
          {byTopic.length === 0
            ? <p className="text-slate-400 text-sm">No data yet.</p>
            : <div className="space-y-5">
              {byTopic.map(t => (
                <div key={t.topic}>
                  <div className="flex items-center justify-between text-sm mb-1.5">
                    <span className="flex items-center gap-2 font-medium text-slate-700 dark:text-slate-200">
                      <span className={`w-2 h-2 rounded-full ${TOPIC_DOT[t.topic]||'bg-slate-400'}`}></span>
                      {t.topic}
                    </span>
                    <span className="text-slate-500 dark:text-slate-400 text-xs tabular-nums">
                      {t.correct}/{t.attempts} · {t.accuracy}% · {fmtTime(t.avgMs)}
                    </span>
                  </div>
                  <div className="w-full h-2.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all ${TOPIC_DOT[t.topic]||'bg-slate-400'}`}
                      style={{width:`${t.accuracy}%`}}></div>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>

        {/* ── By Column ── */}
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6">
          <h2 className="font-bold text-slate-800 dark:text-slate-100 mb-2">Performance by Column</h2>
          <p className="text-xs text-slate-500 dark:text-slate-400 mb-5">
            Column 1 = Algebra 1 & 2 + Geometry · Column 2 = Precalculus · Column 3 = AP Calculus + AP Statistics
          </p>
          <div className="space-y-5">
            {byColumn.map(c => (
              <div key={c.column}>
                <div className="flex items-center justify-between text-sm mb-1.5">
                  <span className="flex items-center gap-2 font-medium text-slate-700 dark:text-slate-200">
                    <span className={`w-2 h-2 rounded-full ${COLUMN_BAR[c.column]||'bg-slate-400'}`}></span>
                    {c.column}
                  </span>
                  <span className="text-slate-500 dark:text-slate-400 text-xs tabular-nums">
                    {c.attempts > 0 ? `${c.correct}/${c.attempts} · ${c.accuracy}% · ${fmtTime(c.avgMs)}` : 'No attempts yet'}
                  </span>
                </div>
                <div className="w-full h-2.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${COLUMN_BAR[c.column]||'bg-slate-400'}`}
                    style={{width:`${c.accuracy}%`}}></div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ── By Difficulty ── */}
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6">
          <h2 className="font-bold text-slate-800 dark:text-slate-100 mb-5">Performance by Difficulty</h2>
          <div className="space-y-5">
            {byDiff.map(d => (
              <div key={d.difficulty}>
                <div className="flex items-center justify-between text-sm mb-1.5">
                  <span className="flex items-center gap-2">
                    <DiffPill d={d.difficulty} />

                  <span className="text-slate-500 dark:text-slate-400 text-xs tabular-nums">
                    {d.attempts > 0 ? `${d.correct}/${d.attempts} · ${d.accuracy}% · ${fmtTime(d.avgMs)}` : 'No attempts yet'}
                  </span>
                </div>
                <div className="w-full h-2.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${DIFF_BAR[d.difficulty]}`}
                    style={{width:`${d.accuracy}%`}}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    _supabase
      .from('community_solutions')
      .select('id,user_id,question_id,solution_text,created_at,updated_at,hidden')
      .eq('user_id', authUser.id)
      .order('created_at', { ascending: false })
      .then(async ({ data, error }) => {
        if (error) {
          console.warn('Error loading community solutions:', error.message);
          setMySolutions([]);
          return;
        }
        const rows = data || [];
        if (!rows.length) { setMySolutions([]); return; }
        // fetch vote counts
        const ids = rows.map(s => s.id);
        const { data: voteRows } = await _supabase
          .from('community_solution_votes')
          .select('solution_id')
          .in('solution_id', ids);
        const counts = {};
        (voteRows || []).forEach(v => { counts[v.solution_id] = (counts[v.solution_id] || 0) + 1; });
        setMySolutions(rows.map(s => ({ ...s, upvotes: counts[s.id] || 0 })));
      });
  }, [authUser]);

  if (!authUser) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📋</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">History</p>
      <p className="text-slate-500 dark:text-slate-400 mb-6">Sign in to see your attempt history.</p>
      <a href="./index.html" className="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors">Sign In</a>
    </div>
  );

  if (loading) return (
    <div className="flex items-center justify-center py-32">
      <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  );

  if (error) return (
    <div className="max-w-6xl mx-auto px-4 py-12 text-center">
      <p className="text-rose-500 font-semibold">Error loading history: {error}</p>
      <p className="text-slate-400 text-sm mt-1">Make sure the attempts table exists in Supabase.</p>
    </div>
  );

  // ── filtering & sorting ────────────────────────────────────────────────────
  const now = new Date();
  const filtered = rows.filter(r => {
    if (filterCorrect === 'Correct Only'   && !r.is_correct) return false;
    if (filterCorrect === 'Incorrect Only' &&  r.is_correct) return false;
    if (filterTopic !== 'All Topics') {
      const rowColumn = getColumnCategory(r);
      if (['Column 1','Column 2','Column 3'].includes(filterTopic)) {
        if (rowColumn !== filterTopic) return false;
      } else if (r.topic !== filterTopic) return false;
    }
    if (filterDiff  !== 'All Difficulties' && r.difficulty !== filterDiff) return false;
    if (filterDate === 'Today') {
      if (new Date(r.created_at).toDateString() !== now.toDateString()) return false;
    } else if (filterDate === 'Last 7 Days') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7);
      if (new Date(r.created_at) < cutoff) return false;
    } else if (filterDate === 'Last 30 Days') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30);
      if (new Date(r.created_at) < cutoff) return false;
    }
    if (search.trim()) {
      const s = search.toLowerCase();
      return (
        (r.question_title || '').toLowerCase().includes(s) ||
        (r.question_text  || '').toLowerCase().includes(s) ||
        (r.topic          || '').toLowerCase().includes(s) ||
        (r.tags           || []).some(t => t.toLowerCase().includes(s))
      );
    }
    return true;
  });

  const sorted = [...filtered].sort((a, b) => {
    if (filterDate === 'Oldest First')
      return new Date(a.created_at) - new Date(b.created_at);
    return new Date(b.created_at) - new Date(a.created_at);
  });

  // find full question from questions.json (for detail modal)
  const findQ = (row) => {
    const q = allQuestions.find(x => x.id === row.question_id);
    if (q) return q;
    // fallback: reconstruct from stored data
    return {
      id: row.question_id,
      title: row.question_title,
      question: row.question_text,
      topic: row.topic,
      difficulty: row.difficulty,
      answer: row.correct_answer,
      explanation: row.explanation,
      tags: row.tags || [],
      choices: [],
    };
  };

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <div className="mb-6">
        <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">History</h1>
        <p className="text-slate-500 dark:text-slate-400 text-sm">{historySubTab === 'attempts' ? `${rows.length} total attempt${rows.length !== 1 ? 's' : ''} · showing ${sorted.length}` : `${mySolutions.length} community solution${mySolutions.length !== 1 ? 's' : ''}`}</p>
        <div className="mt-4 inline-flex rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-1">
          <button onClick={()=>setHistorySubTab('attempts')}
            className={`px-4 py-2 rounded-lg text-sm font-semibold ${historySubTab==='attempts' ? 'bg-blue-600 text-white' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
            Attempts
          </button>
          <button onClick={()=>setHistorySubTab('solutions')}
            className={`px-4 py-2 rounded-lg text-sm font-semibold ${historySubTab==='solutions' ? 'bg-blue-600 text-white' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
            My Community Solutions
          </button>
        </div>
      </div>

      {historySubTab === 'solutions' ? (
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
          {mySolutions.length === 0 ? (
            <div className="py-20 text-center">
              <p className="text-4xl mb-3">💬</p>
              <p className="font-semibold text-slate-700 dark:text-slate-300">No community solutions yet</p>
              <p className="text-sm text-slate-400 mt-1">Solutions you post under questions will appear here.</p>
            </div>
          ) : (
            <div className="divide-y divide-slate-100 dark:divide-slate-800">
              {mySolutions.map(s => {
                const q = getSolutionQuestion(s);
                const preview = q?.question || '';
                return (
                  <div key={s.id}
                    className="relative px-4 py-4"
                    onMouseEnter={() => setHoveredSolutionId(s.id)}
                    onMouseLeave={() => setHoveredSolutionId(null)}>
                    <div className="flex items-start justify-between gap-3 mb-2">
                      <div className="min-w-0">
                        <button
                          onClick={() => { if (q && onOpenQuestion) onOpenQuestion(q.id); }}
                          className="text-left text-sm font-bold text-slate-800 dark:text-slate-100 hover:text-blue-600 dark:hover:text-blue-400 transition-colors cursor-pointer">
                          {q?.title || `Question #${s.question_id}`}
                        </button>
                        <p className="text-xs text-slate-400 dark:text-slate-500">
                          {new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} · {s.upvotes || 0} upvote{(s.upvotes || 0) !== 1 ? 's' : ''}
                        </p>
                      </div>
                      {q && (
                        <button
                          onClick={() => { if (onOpenQuestion) onOpenQuestion(q.id); }}
                          className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white">
                          Open Question
                        </button>
                      )}
                    </div>

                    {hoveredSolutionId === s.id && q && (
                      <div className="absolute left-4 top-14 z-30 w-[min(32rem,calc(100vw-4rem))] rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 shadow-2xl p-4 pointer-events-none">
                        <div className="flex items-center gap-2 mb-2">
                          <span className={`w-2 h-2 rounded-full ${TOPIC_DOT[q.topic] || 'bg-slate-400'}`}></span>
                          <span className="text-xs font-bold text-slate-500 dark:text-slate-400">{q.topic}</span>
                          <DiffPill d={q.difficulty} />
                        </div>
                        <p className="text-sm font-bold text-slate-900 dark:text-white mb-2">{q.title}</p>
                        <p className="text-xs text-slate-600 dark:text-slate-300">
                          <MathText text={preview.slice(0, 260) + (preview.length > 260 ? '...' : '')} />
                        </p>
                      </div>
                    )}

                    <div className="text-sm text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">
                      <MathText text={s.solution_text} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ) : (
      <>
      {/* ── Filter bar ── */}
      <div className="flex flex-wrap gap-2 mb-5">
        {/* search */}
        <div className="relative flex-1 min-w-[200px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
          <input type="text" placeholder="Search title, text, topic, tags…" value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full pl-9 pr-3 py-2 text-sm rounded-lg border bg-white border-slate-200 text-slate-700 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <Dropdown label="Result" value={filterCorrect} onChange={setFilterCorrect}
          options={['All','Correct Only','Incorrect Only']} />
        <Dropdown label="Topic" value={filterTopic} onChange={setFilterTopic}
          options={['All Topics','Column 1','Column 2','Column 3','Algebra 1 & 2','Geometry','Precalculus','AP Calculus','AP Statistics']} />
        <Dropdown label="Difficulty" value={filterDiff} onChange={setFilterDiff}
          options={['All Difficulties','Easy','Medium','Hard']} />
        <Dropdown label="Date" value={filterDate} onChange={setFilterDate}
          options={['Most Recent','Oldest First','Today','Last 7 Days','Last 30 Days']} />
      </div>

      {/* ── Table ── */}
      {sorted.length === 0 ? (
        <div className="py-20 text-center bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800">
          <p className="text-4xl mb-3">{rows.length === 0 ? '📋' : '🔍'}</p>
          <p className="font-semibold text-slate-700 dark:text-slate-300">
            {rows.length === 0 ? 'No attempts yet' : 'No results match your filters'}
          </p>
          <p className="text-sm text-slate-400 mt-1">
            {rows.length === 0 ? 'Answer some problems and they will appear here.' : 'Try adjusting your filters or search.'}
          </p>
        </div>
      ) : (
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
          {/* header */}
          <div className="hidden md:grid grid-cols-[1fr_8rem_6rem_6rem_6rem_6rem] gap-3 px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
            <span>Problem</span><span>Topic</span><span>Difficulty</span><span>Result</span><span>Time</span><span>Date</span>
          </div>
          <div className="divide-y divide-slate-100 dark:divide-slate-800">
            {sorted.map(row => (
              <button key={row.id} onClick={() => setSelected(row)}
                className="group w-full text-left grid grid-cols-[1fr_auto] md:grid-cols-[1fr_8rem_6rem_6rem_6rem_6rem] gap-3 items-center px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-900/60 transition-colors">

                  <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400">

                  </p>
                  <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 md:hidden">
                    {row.topic} · {row.difficulty} · {new Date(row.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  </p>
                </div>
                <div className="hidden md:flex items-center gap-1.5 text-xs text-slate-600 dark:text-slate-300">
                  <span className={`w-1.5 h-1.5 rounded-full ${TOPIC_DOT[row.topic]||'bg-slate-400'}`}></span>
                  <span className="truncate">{row.topic}</span>
                </div>
                <div className="hidden md:block"><DiffPill d={row.difficulty} /></div>
                <div className="hidden md:block">
                  <span className={`inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full
                    ${row.is_correct
                      ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400'
                      : 'bg-rose-100 text-rose-700 dark:bg-rose-500/15 dark:text-rose-400'}`}>
                    {row.is_correct ? '✓ Correct' : '✗ Wrong'}
                  </span>
                </div>
                <div className="hidden md:block text-xs text-slate-500 dark:text-slate-400 tabular-nums">{fmtTime(row.time_taken_ms)}</div>
                <div className="hidden md:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">
                  {new Date(row.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                </div>
                {/* mobile right side */}
                <div className="md:hidden flex flex-col items-end gap-1">
                  <span className={`text-xs font-bold ${row.is_correct ? 'text-emerald-500' : 'text-rose-500'}`}>
                    {row.is_correct ? '✓' : '✗'}
                  </span>
                  <span className="text-xs text-slate-400 tabular-nums">{fmtTime(row.time_taken_ms)}</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      </>
      )}

      {/* ── Detail Modal ── */}
      {selected && (
        <HistoryDetailModal row={selected} q={findQ(selected)} onClose={() => setSelected(null)} />
      )}
    </div>
  );
}

function HistoryDetailModal({ row, q, onClose }) {

      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

        onClick={e => e.stopPropagation()}>

        {/* header */}
