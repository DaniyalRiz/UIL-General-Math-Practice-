<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const TOPICS = ["All Topics","Column 1","Column 2","Column 3","Algebra 1 & 2","Geometry","Precalculus","AP Calculus","AP Statistics"];

const getColumnCategory = (q) => {
  const topic = typeof q === 'string' ? q : q.topic;
  if (topic === "Algebra 1 & 2" || topic === "Geometry") return "Column 1";
  if (topic === "Precalculus") return "Column 2";
  if (topic === "AP Calculus" || topic === "AP Statistics") return "Column 3";
  return null;
};

const DIFFICULTIES = ["All Difficulties","Easy","Medium","Hard"];
const PAGE_SIZE = 15;

// difficulty pill colors (light + dark)
const DIFF_PILL = {
  Easy:   "bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400",
  Medium: "bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400",
  Hard:   "bg-rose-100 text-rose-700 dark:bg-rose-500/15 dark:text-rose-400",
};
const TOPIC_DOT = {
  "Algebra 1 & 2":"bg-violet-500","Geometry":"bg-sky-500","Precalculus":"bg-emerald-500",
  "AP Calculus":"bg-amber-500","AP Statistics":"bg-rose-500",
};
const TOPIC_BAR = TOPIC_DOT;

const fmtTime = ms => {
  const s = Math.round(ms/1000);
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
};

const sourceDisplay = (q) => {
  if (!q) return "";
  const source = q.source || q.original_test || "";
  const problemNumber =
    q.original_question_number ||
    q.answer_key_source?.problem_number ||
    q.problem_number ||
    null;
  return source && problemNumber ? `${source} • Problem ${problemNumber}` : source;
};

// Strip \(...\) and \[...\] delimiters for plain-text row previews
const plainText = (s) => String(s||"")
  .replace(/\\\[([\s\S]*?)\\\]/g, (_,m)=>m.trim())
  .replace(/\\\(([\s\S]*?)\\\)/g, (_,m)=>m.trim())
  .replace(/\s+/g," ").trim();

// ── Math rendering ────────────────────────────────────────────────────────────
// Renders text containing LaTeX. Use $...$ for inline math and $$...$$ for display.
// Falls back to plain text if KaTeX hasn't loaded.
function MathText({ text, className }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (!window.katex) { el.textContent = text; return; }
    // Split on \[...\] (display) and \(...\) (inline). Money uses a plain $, which
    // we leave untouched so it never collides with math.
    const parts = String(text).split(/(\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g);
    el.innerHTML = "";
    parts.forEach(part => {
      if (!part) return;
      const display = part.startsWith("\\[") && part.endsWith("\\]");
      const inline = part.startsWith("\\(") && part.endsWith("\\)");
      if (display || inline) {
        const tex = part.slice(2, part.length - 2);
        const span = document.createElement("span");
        try {
          window.katex.render(tex, span, { displayMode: display, throwOnError: false });
        } catch(e) { span.textContent = tex; }
        el.appendChild(span);
      } else {
        el.appendChild(document.createTextNode(part));
      }
    });
  }, [text]);
  return <span ref={ref} className={className}>{text}</span>;
}

// ── localStorage hook (JSON-backed, survives refresh on this device) ──────────
function useLocalStorage(key, initial) {
  const [value, setValue] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : initial;
    } catch(e) { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e){}
  }, [key, value]);
  return [value, setValue];
}

// ── Theme hook (persists to localStorage) ────────────────────────────────────
function useTheme() {
  const [dark, setDark] = useState(() => {
    try {
      const saved = localStorage.getItem("uilmath-theme");
      if (saved) return saved === "dark";
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    } catch(e) { return false; }
  });
  useEffect(() => {
    const root = document.documentElement;
    if (dark) root.classList.add("dark"); else root.classList.remove("dark");
    try { localStorage.setItem("uilmath-theme", dark ? "dark" : "light"); } catch(e){}
  }, [dark]);
  return [dark, () => setDark(d => !d)];
}

function useTimer() {
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  const start = () => { if (!ref.current) ref.current = setInterval(() => setElapsed(e => e + 1), 1000); };
  const stop  = () => { clearInterval(ref.current); ref.current = null; };
  const reset = () => { stop(); setElapsed(0); };
  useEffect(() => () => clearInterval(ref.current), []);
  return { elapsed, fmt: `${String(Math.floor(elapsed/60)).padStart(2,"0")}:${String(elapsed%60).padStart(2,"0")}`, start, stop, reset };
}

function DiffPill({ d }) {
  return <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold ${DIFF_PILL[d]||""}`}>{d}</span>;
}

// ── Icons ────────────────────────────────────────────────────────────────────
const SunIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>);
const MoonIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>);

// ── Filter dropdown ──────────────────────────────────────────────────────────
function Dropdown({ label, value, options, onChange }) {
  return (
    <div className="relative">
      <select value={value} onChange={e=>onChange(e.target.value)}
        className="appearance-none pl-3 pr-9 py-2 rounded-lg text-sm font-medium border
                   bg-white border-slate-200 text-slate-700
                   dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200
                   focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <span className="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">▾</span>
    </div>
  );
}

// ── Problem list (row layout) ────────────────────────────────────────────────
function ProblemRow({ q, n, status, onOpen }) {
  return (
    <button onClick={onOpen}
      className="group w-full grid grid-cols-[2.5rem_1fr_auto] sm:grid-cols-[3rem_1fr_9rem_7rem_11rem_7rem] items-center gap-3 px-4 py-3 text-left
                 border-b border-slate-100 dark:border-slate-800
                 hover:bg-slate-50 dark:hover:bg-slate-900/60 transition-colors">
      <div className="flex items-center gap-2">
        <span className="text-xs font-mono text-slate-400 dark:text-slate-600 w-6 text-right">{n}</span>
        {status === "correct" && <span className="text-emerald-500 text-sm">●</span>}
        {status === "wrong" && <span className="text-rose-500 text-sm">●</span>}
      </div>
      <div className="min-w-0">
        <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400">
          {q.title || plainText(q.question)}
        </p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 truncate hidden sm:block">{plainText(q.question)}</p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 sm:hidden">{q.topic} · {q.difficulty}</p>
      </div>
      <div className="hidden sm:flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
        <span className={`w-2 h-2 rounded-full ${TOPIC_DOT[q.topic]||"bg-slate-400"}`}></span>{q.topic}
      </div>
      <div className="hidden sm:block"><DiffPill d={q.difficulty} /></div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">{sourceDisplay(q)}</div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">
        {q.date_added ? new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : "—"}
      </div>
    </button>
  );
}

// ── Single problem modal/view ────────────────────────────────────────────────
// ── SimilarProblem: self-contained mini-quiz for AI-generated problems ────────
// ── Similar question recommender ─────────────────────────────────────────────
function getSimilarQuestions(current, allQuestions, answeredIds = []) {
  const others = allQuestions.filter(q => q.id !== current.id);
  const scored = others.map(q => {
    let score = 0;
    // Tag overlap (highest weight — same pattern)
    const sharedTags = (current.tags || []).filter(t => (q.tags || []).includes(t));
    score += sharedTags.length * 10;
    // Same topic
    if (q.topic === current.topic) score += 4;
    // Same difficulty
    if (q.difficulty === current.difficulty) score += 2;
    // Penalise already-answered questions (prefer unseen)
    if (answeredIds.includes(q.id)) score -= 5;
    return { q, score, sharedTags };
  });
  // Sort by score desc, then shuffle ties so it's not always the same 3
  scored.sort((a, b) => b.score - a.score || Math.random() - 0.5);
  return scored.slice(0, 3).map(s => ({ ...s.q, sharedTags: s.sharedTags }));
}

function ProblemView({ q, onClose, onAnswered, prevAnswer, stat, onPrev, onNext, hasPrev, hasNext, isBookmarked, onToggleBookmark, authUser, allQuestions, answeredIds, onOpenQuestion }) {
  const [pending, setPending]   = useState(null);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [crossed, setCrossed]   = useState({});
  // Notes state
  const [notes, setNotes]       = useState([]);
  const [noteText, setNoteText] = useState("");
  const [notesSaving, setNotesSaving] = useState(false);
  const timer = useTimer();
  const startRef = useRef(Date.now());

  // Load notes for this question when it opens
  useEffect(() => {
    setPending(null);
    setSelected(null);
    setAnswered(false);
    setCrossed({});
    setNoteText("");
    timer.reset();
    timer.start(); startRef.current = Date.now();
    // Fetch notes from Supabase
    if (authUser) {
      _supabase.from('notes')
        .select('*')
        .eq('user_id', authUser.id)
        .eq('question_id', q.id)
        .order('created_at', { ascending: true })
        .then(({ data }) => setNotes(data || []));
    } else {
      setNotes([]);
    }
  }, [q.id]);

  const saveNote = async () => {
    if (!noteText.trim() || !authUser) return;
    setNotesSaving(true);
    const { data, error } = await _supabase.from('notes').insert({
      user_id: authUser.id,
      question_id: q.id,
      note_text: noteText.trim(),
    }).select();
    if (!error && data) {
      setNotes(prev => [...prev, data[0]]);
      setNoteText("");
    }
    setNotesSaving(false);
  };

  const deleteNote = async (noteId) => {
    await _supabase.from('notes').delete().eq('id', noteId);
    setNotes(prev => prev.filter(n => n.id !== noteId));
  };

  // Left-click: select/deselect a choice (pending, not yet submitted)
  const handlePick = (choice) => {
    if (answered) return;
    setPending(p => p === choice ? null : choice);
  };

  // Right-click: cross out / un-cross a choice
  const handleCross = (e, choice) => {
    e.preventDefault();
    if (answered) return;
    setCrossed(prev => ({ ...prev, [choice]: !prev[choice] }));
  };

  // Submit button handler
  const handleSubmit = () => {
    if (answered || !pending) return;
    const timeMs = Date.now() - startRef.current;
    setSelected(pending); setAnswered(true); timer.stop();
    onAnswered && onAnswered({
      questionId:    q.id,
      questionTitle: q.title || null,
      questionText:  q.question || null,
      topic:         q.topic,
      difficulty:    q.difficulty,
      selected:      pending,
      correctAnswer: q.answer,
      correct:       pending === q.answer,
      timeMs,
      explanation:   q.explanation || null,
      tags:          q.tags || [],
    });
  };

  const choiceClass = (choice) => {
    const isCrossed = crossed[choice] && !answered;
    if (!answered) {
      if (pending === choice) return "border-blue-500 bg-blue-50 dark:bg-blue-500/10 dark:border-blue-400 cursor-pointer";
      if (isCrossed) return "border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-900/50 opacity-40 cursor-pointer";
      return "border-slate-200 bg-white hover:border-blue-300 hover:bg-blue-50/50 cursor-pointer dark:border-slate-700 dark:bg-slate-900 dark:hover:border-blue-600 dark:hover:bg-slate-800";
    }
    if (choice === q.answer) return "border-emerald-400 bg-emerald-50 text-emerald-800 dark:border-emerald-500/50 dark:bg-emerald-500/10 dark:text-emerald-300";
    if (choice === selected && choice !== q.answer) return "border-rose-400 bg-rose-50 text-rose-800 dark:border-rose-500/50 dark:bg-rose-500/10 dark:text-rose-300";
    return "border-slate-200 bg-slate-50 text-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-600";
  };
  const isCorrect = answered && selected === q.answer;

  // compute similar questions once
  const similarQuestions = React.useMemo(() => {
    const pool = allQuestions.length > 0 ? allQuestions : [];
    if (pool.length <= 1) return [];
    const others = pool.filter(x => x.id !== q.id);
    const scored = others.map(x => {
      let score = 0;
      const sharedTags = (q.tags || []).filter(t => (x.tags || []).includes(t));
      score += sharedTags.length * 10;
      if (x.topic === q.topic) score += 4;
      if (x.difficulty === q.difficulty) score += 2;
      return { x, score, sharedTags };
    });
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 3).map(s => ({ ...s.x, sharedTags: s.sharedTags }));
  }, [q.id, allQuestions]);

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-white dark:bg-slate-950 overflow-y-auto">
      <div className="flex-1 w-full max-w-7xl mx-auto flex flex-col">

        {/* ── header ── */}
        <div className="border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-950 z-10 shadow-sm dark:shadow-slate-900">
          <div className="flex items-center justify-between px-5 pt-3 pb-3 gap-3">

            {/* Left: topic + diff + source + date */}
            <div className="flex items-center gap-2 flex-wrap min-w-0">
              <span className="flex items-center gap-1.5 text-sm font-semibold text-slate-700 dark:text-slate-200">
                <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${TOPIC_DOT[q.topic]}`}></span>
                {q.topic}
              </span>
              <DiffPill d={q.difficulty} />
              {q.source && (
                <span className="hidden sm:inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-xs font-semibold border border-slate-200 dark:border-slate-700">
                  📄 {sourceDisplay(q)}
                </span>
              )}
              {q.date_added && (
                <span className="hidden md:inline text-xs font-medium text-slate-500 dark:text-slate-400 whitespace-nowrap">
                  Added {new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                </span>
              )}
            </div>

            {/* Right: timer + bookmark + close */}
            <div className="flex items-center gap-2 flex-shrink-0">
              {/* Timer — large and prominent */}
              <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg border font-mono text-sm font-bold tabular-nums transition-colors
                ${answered
                  ? "bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500"
                  : "bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/40 text-blue-700 dark:text-blue-300"}`}>
                <svg className="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                  <path strokeLinecap="round" strokeWidth="2" d="M12 6v6l4 2"/>
                </svg>
                {timer.fmt}
              </div>
              <button onClick={onToggleBookmark} title={isBookmarked ? "Remove bookmark" : "Bookmark for review"}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold border transition-all
                  ${isBookmarked
                    ? "bg-amber-50 border-amber-300 text-amber-700 dark:bg-amber-500/15 dark:border-amber-500/40 dark:text-amber-400"
                    : "bg-slate-50 border-slate-200 text-slate-600 hover:border-amber-300 hover:text-amber-600 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:border-amber-500 dark:hover:text-amber-400"}`}>
                <span>🔖</span>
                <span className="hidden sm:inline">{isBookmarked ? "Saved" : "Review later"}</span>
              </button>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 text-xl leading-none transition-colors">×</button>
            </div>
          </div>

          {/* Title row */}
          {q.title && (
            <div className="px-5 pb-3">
              <h2 className="font-display text-xl font-black text-slate-900 dark:text-white tracking-tight">{q.title}</h2>
            </div>
          )}
        </div>

        {/* ── two-column body after answering, single column before ── */}
        <div className={answered ? "flex flex-col lg:flex-row flex-1 min-h-0" : "flex flex-col flex-1"}>

          {/* ── LEFT column: question + choices + explanation + tags ── */}
          <div className={answered ? "lg:flex-1 lg:min-w-0 flex flex-col" : "flex flex-col"}>

            {/* ── question ── */}
            <div className="px-6 pt-5 pb-4">
              <p className="text-slate-800 dark:text-slate-100 font-medium text-base leading-relaxed whitespace-pre-line">
                <MathText text={q.question} />
              </p>
              {q.image && (
                <div className="mt-4 flex justify-center">
                  <img src={q.image} alt="Figure for problem"
                    className="max-w-full sm:max-w-md rounded-xl border border-slate-200 dark:border-slate-700 bg-white" />
                </div>
              )}
            </div>

            {/* ── hint ── */}
            {!answered && (
              <p className="px-6 pb-2 text-xs text-slate-400 dark:text-slate-500">
                Click to select · Right-click to cross out · Press <kbd className="px-1 py-0.5 rounded bg-slate-100 dark:bg-slate-800 font-mono text-[10px]">Submit</kbd> to check
              </p>
            )}

            {/* ── choices ── */}
            <div className="px-6 pb-4 grid gap-2.5">
              {q.choices.map((choice, i) => (
                <button key={i}
                  onClick={() => handlePick(choice)}
                  onContextMenu={(e) => handleCross(e, choice)}
                  className={`w-full text-left px-4 py-3 rounded-xl border-2 text-sm font-medium transition-all duration-150 flex items-center gap-3 select-none ${choiceClass(choice)}`}>
                  <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs shrink-0 font-black relative transition-all
                    ${answered && choice === q.answer
                      ? "bg-emerald-500 text-white border-2 border-emerald-500"
                      : answered && choice === selected && choice !== q.answer
                        ? "bg-rose-500 text-white border-2 border-rose-500"
                        : pending === choice && !answered
                          ? "bg-blue-500 text-white border-2 border-blue-500"
                          : "border-2 border-slate-300 dark:border-slate-600 text-slate-400 dark:text-slate-500"}
                    ${crossed[choice] && !answered ? "opacity-30" : ""}`}>
                    {String.fromCharCode(65+i)}
                    {crossed[choice] && !answered && (
                      <span className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span className="w-full h-0.5 bg-current rotate-45 absolute"></span>
                      </span>
                    )}
                  </span>
                  <span className={crossed[choice] && !answered ? "line-through opacity-50" : ""}>
                    <MathText text={choice.replace(/^\([A-E]\)\s*/, '')} />
                  </span>
                  {!answered && crossed[choice] && (
                    <span className="ml-auto text-slate-400 text-xs">✕</span>
                  )}
                  {answered && choice===q.answer && <span className="ml-auto text-emerald-600 dark:text-emerald-400 font-bold text-base">✓</span>}
                  {answered && choice===selected && choice!==q.answer && <span className="ml-auto text-rose-500 font-bold text-base">✗</span>}
                </button>
              ))}
            </div>

            {/* ── submit button (pre-answer) ── */}
            {!answered && (

// ANALYTICS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function AnalyticsPage({ authUser }) {
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]   = useState(null);

  useEffect(() => {
    if (!authUser) { setLoading(false); return; }
    setLoading(true);
    _supabase
      .from('attempts')
      .select('topic,difficulty,is_correct,time_taken_ms,created_at')
      .eq('user_id', authUser.id)
      .order('created_at', { ascending: false })
      .then(({ data: rows, error: err }) => {
        if (err) { setError(err.message); setLoading(false); return; }
        setData(rows || []);
        setLoading(false);
      });
  }, [authUser]);

  if (!authUser) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📊</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">Analytics</p>
      <p className="text-slate-500 dark:text-slate-400 mb-6">Sign in to see your personal performance analytics.</p>
      <a href="./index.html" className="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors">Sign In</a>
    </div>
  );

  if (loading) return (
    <div className="flex items-center justify-center py-32">
      <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  );

  if (error) return (
    <div className="max-w-6xl mx-auto px-4 py-12 text-center">
      <p className="text-rose-500 font-semibold">Error loading analytics: {error}</p>
      <p className="text-slate-400 text-sm mt-1">Make sure the attempts table exists in Supabase.</p>
    </div>
  );

  if (!data || data.length === 0) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📊</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">No data yet</p>
      <p className="text-slate-500 dark:text-slate-400">Answer some problems and your analytics will appear here.</p>
    </div>
  );

  // ── compute stats ──────────────────────────────────────────────────────────
  const total      = data.length;
  const correct    = data.filter(r => r.is_correct).length;
  const accuracy   = total ? Math.round(100 * correct / total) : 0;
  const totalMs    = data.reduce((s, r) => s + (r.time_taken_ms || 0), 0);
  const avgMs      = total ? Math.round(totalMs / total) : 0;

  // by topic
  const topicMap = {};
  data.forEach(r => {
    if (!topicMap[r.topic]) topicMap[r.topic] = { attempts:0, correct:0, totalMs:0 };
    topicMap[r.topic].attempts++;
    if (r.is_correct) topicMap[r.topic].correct++;
    topicMap[r.topic].totalMs += r.time_taken_ms || 0;
  });
  const byTopic = Object.entries(topicMap).map(([topic, v]) => ({
    topic, attempts: v.attempts, correct: v.correct,
    accuracy: Math.round(100 * v.correct / v.attempts),
    avgMs: Math.round(v.totalMs / v.attempts),
  })).sort((a,b) => b.attempts - a.attempts);

  // by difficulty
  const diffMap = {};
  data.forEach(r => {
    if (!diffMap[r.difficulty]) diffMap[r.difficulty] = { attempts:0, correct:0, totalMs:0 };
    diffMap[r.difficulty].attempts++;
    if (r.is_correct) diffMap[r.difficulty].correct++;
    diffMap[r.difficulty].totalMs += r.time_taken_ms || 0;
  });
  const byDiff = ['Easy','Medium','Hard'].map(d => {
    const v = diffMap[d] || { attempts:0, correct:0, totalMs:0 };
    return { difficulty:d, attempts:v.attempts, correct:v.correct,
      accuracy: v.attempts ? Math.round(100 * v.correct / v.attempts) : 0,
      avgMs: v.attempts ? Math.round(v.totalMs / v.attempts) : 0 };
  });

  // by UIL column
  const columnMap = {};
  data.forEach(r => {
    const column = getColumnCategory(r);
    if (!column) return;
    if (!columnMap[column]) columnMap[column] = { attempts:0, correct:0, totalMs:0 };
    columnMap[column].attempts++;
    if (r.is_correct) columnMap[column].correct++;
    columnMap[column].totalMs += r.time_taken_ms || 0;
  });
  const byColumn = ['Column 1','Column 2','Column 3'].map(column => {
    const v = columnMap[column] || { attempts:0, correct:0, totalMs:0 };
    return { column, attempts:v.attempts, correct:v.correct,
      accuracy: v.attempts ? Math.round(100 * v.correct / v.attempts) : 0,
      avgMs: v.attempts ? Math.round(v.totalMs / v.attempts) : 0 };
  });

  // insights
  const topicsWithData = byTopic.filter(t => t.attempts > 0);
  const strongest = topicsWithData.length ? topicsWithData.reduce((a,b) => a.accuracy>=b.accuracy?a:b) : null;
  const weakest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.accuracy<=b.accuracy?a:b) : null;
  const fastest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.avgMs<=b.avgMs?a:b) : null;
  const slowest   = topicsWithData.length ? topicsWithData.reduce((a,b) => a.avgMs>=b.avgMs?a:b) : null;

  // streak
  const days = [...new Set(data.map(r => new Date(r.created_at).toDateString()))];
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (days.includes(d.toDateString())) streak++;
    else if (i > 0) break;
  }

  const DIFF_BAR = { Easy:'bg-emerald-500', Medium:'bg-amber-500', Hard:'bg-rose-500' };
  const COLUMN_BAR = { 'Column 1':'bg-blue-500', 'Column 2':'bg-violet-500', 'Column 3':'bg-fuchsia-500' };

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <div className="mb-6">
        <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">Analytics</h1>
        <p className="text-slate-500 dark:text-slate-400 text-sm">Your personal performance across all practice sessions</p>
      </div>

      {/* ── Summary Cards ── */}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
        {[
          { label:'Attempted',      value: total,           color:'text-blue-600 dark:text-blue-400' },
          { label:'Correct',        value: correct,         color:'text-emerald-600 dark:text-emerald-400' },
          { label:'Accuracy',       value: accuracy + '%',  color: accuracy>=70?'text-emerald-600 dark:text-emerald-400':accuracy>=50?'text-amber-600 dark:text-amber-400':'text-rose-600 dark:text-rose-400' },
          { label:'Avg Time',       value: fmtTime(avgMs),  color:'text-slate-800 dark:text-slate-100' },
          { label:'Total Time',     value: fmtTime(totalMs),color:'text-slate-800 dark:text-slate-100' },
          { label:'Day Streak',     value: streak + (streak===1?' day':' days'), color:'text-amber-600 dark:text-amber-400' },
        ].map(({ label, value, color }) => (
          <div key={label} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 text-center shadow-sm">
            <p className={`text-2xl font-black ${color}`}>{value}</p>
            <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium uppercase tracking-wide">{label}</p>
          </div>
        ))}
      </div>

      {/* ── Insights row ── */}
      {topicsWithData.length > 1 && (
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
          {[
            { emoji:'💪', label:'Strongest Topic', value: strongest?.topic, sub: strongest?.accuracy + '% accuracy' },
            { emoji:'📈', label:'Needs Work',       value: weakest?.topic,   sub: weakest?.accuracy + '% accuracy' },
            { emoji:'⚡', label:'Fastest Topic',    value: fastest?.topic,   sub: fmtTime(fastest?.avgMs) + ' avg' },
            { emoji:'🐢', label:'Slowest Topic',    value: slowest?.topic,   sub: fmtTime(slowest?.avgMs) + ' avg' },
          ].map(({ emoji, label, value, sub }) => (
            <div key={label} className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 shadow-sm">
              <p className="text-2xl mb-1">{emoji}</p>

// HISTORY TAB
// ═══════════════════════════════════════════════════════════════════════════════
function HistoryPage({ authUser, allQuestions }) {
  const [rows, setRows]         = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [selected, setSelected] = useState(null); // detail modal

  // filters
  const [filterCorrect, setFilterCorrect] = useState('All');
  const [filterTopic,   setFilterTopic]   = useState('All Topics');
  const [filterDiff,    setFilterDiff]    = useState('All Difficulties');
  const [filterDate,    setFilterDate]    = useState('Most Recent');
  const [search, setSearch]               = useState('');

  useEffect(() => {
    if (!authUser) { setLoading(false); return; }
    setLoading(true);
    _supabase
      .from('attempts')
      .select('*')
      .eq('user_id', authUser.id)
      .order('created_at', { ascending: false })
      .then(({ data, error: err }) => {
        if (err) { setError(err.message); setLoading(false); return; }
        setRows(data || []);
        setLoading(false);
      });
  }, [authUser]);

  if (!authUser) return (
    <div className="max-w-6xl mx-auto px-4 py-16 text-center">
      <p className="text-5xl mb-4">📋</p>
      <p className="font-display text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">History</p>
      <p className="text-slate-500 dark:text-slate-400 mb-6">Sign in to see your attempt history.</p>
      <a href="./index.html" className="inline-block px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors">Sign In</a>
    </div>
  );

  if (loading) return (
    <div className="flex items-center justify-center py-32">
      <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  );

  if (error) return (
    <div className="max-w-6xl mx-auto px-4 py-12 text-center">
      <p className="text-rose-500 font-semibold">Error loading history: {error}</p>
      <p className="text-slate-400 text-sm mt-1">Make sure the attempts table exists in Supabase.</p>
    </div>
  );

  // ── filtering & sorting ────────────────────────────────────────────────────
  const now = new Date();
  const filtered = rows.filter(r => {
    if (filterCorrect === 'Correct Only'   && !r.is_correct) return false;
    if (filterCorrect === 'Incorrect Only' &&  r.is_correct) return false;
    if (filterTopic !== 'All Topics') {
      const rowColumn = getColumnCategory(r);
      if (['Column 1','Column 2','Column 3'].includes(filterTopic)) {
        if (rowColumn !== filterTopic) return false;
      } else if (r.topic !== filterTopic) return false;
    }
    if (filterDiff  !== 'All Difficulties' && r.difficulty !== filterDiff) return false;
    if (filterDate === 'Today') {
      if (new Date(r.created_at).toDateString() !== now.toDateString()) return false;
    } else if (filterDate === 'Last 7 Days') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7);
      if (new Date(r.created_at) < cutoff) return false;
    } else if (filterDate === 'Last 30 Days') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30);
      if (new Date(r.created_at) < cutoff) return false;
    }
    if (search.trim()) {
      const s = search.toLowerCase();
      return (
        (r.question_title || '').toLowerCase().includes(s) ||
        (r.question_text  || '').toLowerCase().includes(s) ||
        (r.topic          || '').toLowerCase().includes(s) ||
        (r.tags           || []).some(t => t.toLowerCase().includes(s))
      );
    }
    return true;
  });

  const sorted = [...filtered].sort((a, b) => {
    if (filterDate === 'Oldest First')
      return new Date(a.created_at) - new Date(b.created_at);
    return new Date(b.created_at) - new Date(a.created_at);
  });

  // find full question from questions.json (for detail modal)
  const findQ = (row) => {
    const q = allQuestions.find(x => x.id === row.question_id);
    if (q) return q;
    // fallback: reconstruct from stored data
    return {
      id: row.question_id,
      title: row.question_title,
      question: row.question_text,
      topic: row.topic,
      difficulty: row.difficulty,
      answer: row.correct_answer,
      explanation: row.explanation,
      tags: row.tags || [],
      choices: [],
    };
  };

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <div className="mb-6">
        <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">History</h1>
        <p className="text-slate-500 dark:text-slate-400 text-sm">{rows.length} total attempt{rows.length !== 1 ? 's' : ''} · showing {sorted.length}</p>
      </div>

      {/* ── Filter bar ── */}
      <div className="flex flex-wrap gap-2 mb-5">
        {/* search */}
        <div className="relative flex-1 min-w-[200px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
          <input type="text" placeholder="Search title, text, topic, tags…" value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full pl-9 pr-3 py-2 text-sm rounded-lg border bg-white border-slate-200 text-slate-700 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <Dropdown label="Result" value={filterCorrect} onChange={setFilterCorrect}
          options={['All','Correct Only','Incorrect Only']} />
        <Dropdown label="Topic" value={filterTopic} onChange={setFilterTopic}
          options={['All Topics','Column 1','Column 2','Column 3','Algebra 1 & 2','Geometry','Precalculus','AP Calculus','AP Statistics']} />
        <Dropdown label="Difficulty" value={filterDiff} onChange={setFilterDiff}
          options={['All Difficulties','Easy','Medium','Hard']} />
        <Dropdown label="Date" value={filterDate} onChange={setFilterDate}
          options={['Most Recent','Oldest First','Today','Last 7 Days','Last 30 Days']} />
      </div>

      {/* ── Table ── */}
      {sorted.length === 0 ? (
        <div className="py-20 text-center bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800">
          <p className="text-4xl mb-3">{rows.length === 0 ? '📋' : '🔍'}</p>
          <p className="font-semibold text-slate-700 dark:text-slate-300">
            {rows.length === 0 ? 'No attempts yet' : 'No results match your filters'}
          </p>
          <p className="text-sm text-slate-400 mt-1">
            {rows.length === 0 ? 'Answer some problems and they will appear here.' : 'Try adjusting your filters or search.'}
          </p>
        </div>
      ) : (
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
          {/* header */}
          <div className="hidden md:grid grid-cols-[1fr_8rem_6rem_6rem_6rem_6rem] gap-3 px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
            <span>Problem</span><span>Topic</span><span>Difficulty</span><span>Result</span><span>Time</span><span>Date</span>
          </div>
          <div className="divide-y divide-slate-100 dark:divide-slate-800">
            {sorted.map(row => (
              <button key={row.id} onClick={() => setSelected(row)}
                className="group w-full text-left grid grid-cols-[1fr_auto] md:grid-cols-[1fr_8rem_6rem_6rem_6rem_6rem] gap-3 items-center px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-900/60 transition-colors">
                <div className="min-w-0">
                  <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400">
                    {row.question_title || plainText(row.question_text) || 'Question #' + row.question_id}
                  </p>
                  <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 md:hidden">
                    {row.topic} · {row.difficulty} · {new Date(row.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  </p>
                </div>
                <div className="hidden md:flex items-center gap-1.5 text-xs text-slate-600 dark:text-slate-300">
                  <span className={`w-1.5 h-1.5 rounded-full ${TOPIC_DOT[row.topic]||'bg-slate-400'}`}></span>
                  <span className="truncate">{row.topic}</span>
                </div>
                <div className="hidden md:block"><DiffPill d={row.difficulty} /></div>
                <div className="hidden md:block">
                  <span className={`inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full
                    ${row.is_correct
                      ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400'
                      : 'bg-rose-100 text-rose-700 dark:bg-rose-500/15 dark:text-rose-400'}`}>
                    {row.is_correct ? '✓ Correct' : '✗ Wrong'}
                  </span>
                </div>
                <div className="hidden md:block text-xs text-slate-500 dark:text-slate-400 tabular-nums">{fmtTime(row.time_taken_ms)}</div>
                <div className="hidden md:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">
                  {new Date(row.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                </div>
                {/* mobile right side */}
                <div className="md:hidden flex flex-col items-end gap-1">
                  <span className={`text-xs font-bold ${row.is_correct ? 'text-emerald-500' : 'text-rose-500'}`}>
                    {row.is_correct ? '✓' : '✗'}
                  </span>
                  <span className="text-xs text-slate-400 tabular-nums">{fmtTime(row.time_taken_ms)}</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ── Detail Modal ── */}
      {selected && (
        <HistoryDetailModal row={selected} q={findQ(selected)} onClose={() => setSelected(null)} />
      )}
    </div>
  );
}

function App() {
  const [dark, toggleTheme] = useTheme();
  const [authUser, setAuthUser] = useState(null);
  const [tab, setTab] = useState('problems'); // 'problems' | 'analytics' | 'history'

  // Auth state listener — use getSession() which reliably restores persisted sessions
  useEffect(() => {
    _supabase.auth.getSession().then(({ data: { session } }) => {
      setAuthUser(session?.user ?? null);
    });
    const { data: { subscription } } = _supabase.auth.onAuthStateChange((_e, session) => {
      setAuthUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signOut = async () => { await _supabase.auth.signOut(); };
  const [topic, setTopic] = useState("All Topics");
  const [diff, setDiff] = useState("All Difficulties");
  const [search, setSearch] = useState("");
  const [page, setPage] = useState(1);
  const [openIdx, setOpenIdx] = useState(null);
  const [view, setView] = useState("list");

  const answersRef = useRef({});
  const [answerVersion, setAnswerVersion] = useState(0);
  const [qStats, setQStats] = useLocalStorage("uilmath-qstats", {});
  const [bookmarks, setBookmarks] = useLocalStorage("uilmath-bookmarks", []);
  const [recommendedMode, setRecommendedMode] = useState(false);

  // ── Question loading ─────────────────────────────────────────────────────
  const [questions, setQuestions] = useState([]);
  const [loadState, setLoadState] = useState("loading"); // "loading" | "ready" | "error"
  const [loadError, setLoadError] = useState("");

  useEffect(() => {
    let cancelled = false;
    fetch("./questions.json")
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(data => {
        if (!cancelled) { setQuestions(data); setLoadState("ready"); }
      })
      .catch(err => {
        if (!cancelled) { setLoadError(err.message); setLoadState("error"); }
      });
    return () => { cancelled = true; };
  }, []);

  const toggleBookmark = (id) => {
    setBookmarks(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );
  };

  const recommendedIds = useMemo(() => {
    if (!questions.length) return new Set();

    const answeredEntries = Object.entries(qStats || {});
    if (!answeredEntries.length) {
      return new Set(
        questions
          .slice()
          .sort((a, b) => {
            const rank = { Easy: 0, Medium: 1, Hard: 2 };
            return (rank[a.difficulty] ?? 1) - (rank[b.difficulty] ?? 1);
          })
          .slice(0, 20)
          .map(q => q.id)
      );
    }

    const attemptedIds = new Set(answeredEntries.map(([id]) => Number(id)));
    const topicStats = {};
    const columnStats = {};

    questions.forEach(q => {
      const stat = qStats[q.id];
      if (!stat || !stat.attempts) return;

      if (!topicStats[q.topic]) topicStats[q.topic] = { attempts: 0, correct: 0 };
      topicStats[q.topic].attempts += stat.attempts;
      topicStats[q.topic].correct += stat.correct || 0;

      const col = getColumnCategory(q);
      if (col) {
        if (!columnStats[col]) columnStats[col] = { attempts: 0, correct: 0 };
        columnStats[col].attempts += stat.attempts;
        columnStats[col].correct += stat.correct || 0;
      }
    });

    const acc = (obj, key) => obj[key] && obj[key].attempts ? obj[key].correct / obj[key].attempts : 0.65;

    const scored = questions.map(q => {
      const topicAccuracy = acc(topicStats, q.topic);
      const columnAccuracy = acc(columnStats, getColumnCategory(q));
      const unattemptedBoost = attemptedIds.has(q.id) ? 0 : 30;
      const weakTopicBoost = (1 - topicAccuracy) * 45;
      const weakColumnBoost = (1 - columnAccuracy) * 35;
      const difficultyBoost = q.difficulty === "Medium" ? 4 : q.difficulty === "Hard" ? 2 : 0;
      return { q, score: unattemptedBoost + weakTopicBoost + weakColumnBoost + difficultyBoost };
    });

    return new Set(scored.sort((a, b) => b.score - a.score).slice(0, 25).map(x => x.q.id));
  }, [questions, qStats]);

  const filtered = useMemo(() => questions.filter(q => {
    if (recommendedMode && !recommendedIds.has(q.id)) return false;
    if (topic !== "All Topics") {
      const col = getColumnCategory(q);
      if (["Column 1","Column 2","Column 3"].includes(topic)) {
        if (col !== topic) return false;
      } else if (q.topic !== topic) return false;
    }
    if (diff !== "All Difficulties" && q.difficulty !== diff) return false;
    if (search.trim()) {
      const s = search.toLowerCase();
      return q.question.toLowerCase().includes(s) || q.tags.some(t=>t.includes(s)) || q.topic.toLowerCase().includes(s) || (q.source||"").toLowerCase().includes(s);
    }
    return true;
  }), [questions, topic, diff, search, recommendedMode, recommendedIds]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const pageClamped = Math.min(page, totalPages);
  const pageItems = filtered.slice((pageClamped-1)*PAGE_SIZE, pageClamped*PAGE_SIZE);

  const recordAnswer = (rec) => {
    answersRef.current[rec.questionId] = rec;
    setAnswerVersion(v=>v+1);
    saveAnswerToSupabase(authUser, rec); // rec already contains questionTitle/Text/etc from ProblemView
    // Accumulate persistent per-question stats
    setQStats(prev => {
      const cur = prev[rec.questionId] || { attempts:0, correct:0, bestMs:null, lastMs:null };
      const next = {
        attempts: cur.attempts + 1,
        correct: cur.correct + (rec.correct ? 1 : 0),
        bestMs: cur.bestMs == null ? rec.timeMs : Math.min(cur.bestMs, rec.timeMs),
        lastMs: rec.timeMs,
      };
      return { ...prev, [rec.questionId]: next };
    });
  };


  const counts = useMemo(()=>{
    const t={}, d={};
    TOPICS.forEach(x=> {
      if (x==="All Topics") t[x]=questions.length;
      else if (["Column 1","Column 2","Column 3"].includes(x))
        t[x]=questions.filter(q=>getColumnCategory(q)===x).length;
      else
        t[x]=questions.filter(q=>q.topic===x).length;
    });
    DIFFICULTIES.forEach(x=> d[x] = x==="All Difficulties"?questions.length:questions.filter(q=>q.difficulty===x).length);
    return {t,d};
  },[questions]);

;


  const onFilter = (setter,val)=>{ setter(val); setPage(1); };

  const statusFor = (q) => {
    const a = answersRef.current[q.id];
    if (!a) return undefined;
    return a.correct ? "correct" : "wrong";
  };

  // Loading / error screens — shown before the nav even renders
  if (loadState === "loading") {
    return (
      <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center">
        <div className="text-center px-6">
          <div className="inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="text-slate-700 dark:text-slate-200 font-semibold text-lg">Loading practice questions…</p>
          <p className="text-slate-400 text-sm mt-1">Fetching questions.json</p>
        </div>
      </div>
    );
  }
  if (loadState === "error") {
    return (
      <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center">
        <div className="text-center px-6 max-w-md">
          <p className="text-4xl mb-4">⚠️</p>
          <p className="text-slate-800 dark:text-slate-100 font-bold text-lg mb-2">Could not load questions</p>
          <p className="text-slate-500 dark:text-slate-400 text-sm mb-4">Make sure <code className="bg-slate-100 dark:bg-slate-800 px-1 rounded">questions.json</code> is in the same folder as <code className="bg-slate-100 dark:bg-slate-800 px-1 rounded">index.html</code> in your GitHub repo.</p>
          <p className="text-slate-400 text-xs font-mono">{loadError}</p>
          <button onClick={()=>window.location.reload()} className="mt-4 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold">Retry</button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors">
      {/* NAV */}
      <nav className="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800">
        <div className="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
          {/* Left: logo + tabs */}
          <div className="flex items-center gap-3 sm:gap-4 min-w-0 overflow-x-auto">
            <span className="font-bold text-slate-800 dark:text-slate-100 text-base tracking-tight whitespace-nowrap hidden md:block flex-shrink-0">UIL Math</span>
            <div className="flex items-center gap-0.5 flex-shrink-0">
              <a href="./index.html"
                className="px-2.5 sm:px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors whitespace-nowrap">
                Home
              </a>
              <button onClick={()=>{ setTab('problems'); setView('list'); setOpenIdx(null); }}
                className={`px-2.5 sm:px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap
                  ${tab==='problems'
                    ? 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100'
                    : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                Problems
              </button>
              <button onClick={()=>setTab('analytics')}
                className={`px-2.5 sm:px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap
                  ${tab==='analytics'
                    ? 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100'
                    : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                Analytics
              </button>
              <button onClick={()=>setTab('history')}
                className={`px-2.5 sm:px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap
                  ${tab==='history'
                    ? 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100'
                    : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                History
              </button>
            </div>
          </div>
          <div className="flex items-center gap-2">

            <button onClick={()=>{ setRecommendedMode(v=>!v); setView("list"); setPage(1); }}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold border transition-all
                ${recommendedMode
                  ? "bg-blue-600 border-blue-600 text-white"
                  : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400"}`}>
              🎯 <span className="hidden sm:inline">Recommended</span><span className="sm:hidden">Rec</span>
            </button>
            <button onClick={()=>setView(v=>v==="review"?"list":"review")}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold border transition-all
                ${view==="review"
                  ? "bg-amber-500 border-amber-500 text-white"
                  : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:border-amber-400 hover:text-amber-600 dark:hover:text-amber-400"}`}>
              🔖 <span className="hidden sm:inline">Review</span>{bookmarks.length>0 && <span className={`ml-0.5 text-xs font-bold px-1.5 py-0.5 rounded-full ${view==="review"?"bg-amber-400":"bg-amber-100 dark:bg-amber-500/20 text-amber-700 dark:text-amber-400"}`}>{bookmarks.length}</span>}
            </button>
            <button onClick={toggleTheme} title="Toggle theme"
              className="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
              {dark ? <SunIcon/> : <MoonIcon/>}
            </button>
            {/* Auth pill */}
            {authUser ? (
              <div className="flex items-center gap-2">
                <span className="hidden sm:block text-xs font-semibold text-slate-500 dark:text-slate-400 max-w-[100px] truncate">
                  {authUser.user_metadata?.display_name || authUser.email?.split("@")[0]}
                </span>
                <button onClick={signOut}
                  className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium">
                  Sign Out
                </button>
              </div>
            ) : (
              <a href="./index.html"
                className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors">
                Sign In
              </a>
            )}
          </div>
        </div>
      </nav>

      {tab === 'analytics' ? (
        <AnalyticsPage authUser={authUser} />
      ) : tab === 'history' ? (
        <HistoryPage authUser={authUser} allQuestions={questions} />
      ) : view === "review" ? (
        <div className="max-w-6xl mx-auto px-4 py-8">
          <div className="mb-6 flex items-center justify-between">
            <div>
              <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">Review Later</h1>
              <p className="text-slate-500 dark:text-slate-400 text-sm">{bookmarks.length} bookmarked problem{bookmarks.length!==1?"s":""}</p>
              <p className="text-slate-400 dark:text-slate-600 text-xs mt-1">← Click <span className="font-semibold text-slate-500 dark:text-slate-400">Problems</span> in the nav to return to all problems</p>
            </div>
            {bookmarks.length>0 && (
              <button onClick={()=>setBookmarks([])} className="text-xs text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 transition-colors">Clear all</button>
            )}
          </div>
          {bookmarks.length === 0 ? (
            <div className="text-center py-24 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800">
              <p className="text-4xl mb-3">🔖</p>
              <p className="font-semibold text-slate-700 dark:text-slate-300">No bookmarks yet</p>
              <p className="text-sm text-slate-400 mt-1">Open any problem and click "Review later" to save it here.</p>
            </div>
          ) : (
            <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
              <div className="hidden sm:grid grid-cols-[3rem_1fr_9rem_7rem_11rem_7rem] gap-3 px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
                <span>#</span><span>Problem</span><span>Topic</span><span>Difficulty</span><span>Source</span><span>Date Added</span>
              </div>
              {questions.filter(q=>bookmarks.includes(q.id)).map((q,i) => (
                <ProblemRow key={q.id} q={q} n={i+1} status={statusFor(q)}
                  onOpen={()=>{ setOpenIdx(filtered.findIndex(x=>x.id===q.id)); if(filtered.findIndex(x=>x.id===q.id)===-1){ setTopic("All Topics"); setDiff("All Difficulties"); setSearch(""); } }} />
              ))}
            </div>
          )}
        </div>
      ) : (
      <div className="max-w-6xl mx-auto px-4 py-8">
        {/* HEADER */}
        <div className="mb-6">
          <h1 className="font-display text-4xl font-black tracking-tight text-slate-900 dark:text-white mb-1">Problems</h1>
          <p className="text-slate-500 dark:text-slate-400 text-sm">UIL General Mathematics · {filtered.length} problems · real questions from 2026 District, Region &amp; TMSCA tests</p>
        </div>

        {/* FILTER BAR */}
        <div className="flex flex-wrap items-center gap-3 mb-5">
          <div className="relative flex-1 min-w-[200px]">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
            <input type="text" placeholder="Search problems…" value={search}
              onChange={e=>{setSearch(e.target.value); setPage(1);}}
              className="w-full pl-9 pr-3 py-2 text-sm rounded-lg border bg-white border-slate-200 text-slate-700 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <Dropdown label="Topic" value={topic} options={TOPICS} onChange={v=>onFilter(setTopic,v)} />
          <Dropdown label="Difficulty" value={diff} options={DIFFICULTIES} onChange={v=>onFilter(setDiff,v)} />
        </div>

        {/* TABLE */}
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
          {/* column header */}
          <div className="hidden sm:grid grid-cols-[3rem_1fr_9rem_7rem_11rem_7rem] gap-3 px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
            <span>#</span><span>Problem</span><span>Topic</span><span>Difficulty</span><span>Source</span><span>Date Added</span>
          </div>
          {pageItems.length === 0 ? (
            <div className="py-20 text-center text-slate-400 dark:text-slate-600">
              <p className="text-4xl mb-3">🔍</p><p className="font-semibold">No problems found</p>
            </div>
          ) : pageItems.map((q, i) => {
            const globalIdx = (pageClamped-1)*PAGE_SIZE + i;
            return <ProblemRow key={q.id} q={q} n={globalIdx+1} status={statusFor(q)} onOpen={()=>setOpenIdx(globalIdx)} />;
          })}
        </div>

        {/* PAGINATION */}
        {totalPages > 1 && (
          <div className="flex items-center justify-center gap-1.5 mt-6">
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={pageClamped===1}
              className={`px-3 py-1.5 rounded-lg text-sm font-medium ${pageClamped===1?"text-slate-300 dark:text-slate-700 cursor-not-allowed":"text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800"}`}>‹</button>
            {Array.from({length: totalPages}, (_,i)=>i+1).map(p => (
              <button key={p} onClick={()=>setPage(p)}
                className={`w-9 h-9 rounded-lg text-sm font-medium ${p===pageClamped?"bg-blue-600 text-white":"text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800"}`}>{p}</button>
            ))}
            <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={pageClamped===totalPages}
              className={`px-3 py-1.5 rounded-lg text-sm font-medium ${pageClamped===totalPages?"text-slate-300 dark:text-slate-700 cursor-not-allowed":"text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800"}`}>›</button>
          </div>
        )}
      </div>
      )}

      {/* PROBLEM VIEW — only when on problems tab */}

      {tab === 'problems' && openIdx !== null && filtered[openIdx] && (
        <ProblemView
          q={filtered[openIdx]}
          prevAnswer={answersRef.current[filtered[openIdx].id]}
          stat={qStats[filtered[openIdx].id]}
          isBookmarked={bookmarks.includes(filtered[openIdx].id)}
          onToggleBookmark={()=>toggleBookmark(filtered[openIdx].id)}
          onClose={()=>setOpenIdx(null)}
          onAnswered={recordAnswer}
          hasPrev={openIdx>0}
          hasNext={openIdx<filtered.length-1}
          onPrev={()=>setOpenIdx(i=>Math.max(0,i-1))}
          onNext={()=>setOpenIdx(i=>Math.min(filtered.length-1,i+1))}
          authUser={authUser}
          allQuestions={questions}
          answeredIds={Object.keys(answersRef.current).map(Number)}
          onOpenQuestion={(id)=>{
            const idx = filtered.findIndex(x=>x.id===id);
            if(idx!==-1){ setOpenIdx(idx); }
            else {
              // question not in current filter — reset filters and find it
              setTopic("All Topics"); setDiff("All Difficulties"); setSearch("");
              // after state update, find index in full questions list
              const qIdx = questions.findIndex(x=>x.id===id);
              if(qIdx!==-1) setTimeout(()=>setOpenIdx(qIdx),50);
            }
          }}
        />
      )}

      <footer className="border-t border-slate-200 dark:border-slate-800 py-6 text-center text-xs text-slate-400 dark:text-slate-600">
        UIL General Mathematics Practice · Questions from 2026 UIL &amp; TMSCA competition tests, used with permission for study.
      </footer>
    </div>
  );
}

const SUPABASE_URL = 'https://vhodgagwcxoooqnmfpbo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SXqKKIMvbNZJFq9OzM0uHA_3FGZf84v';
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATS HELPERS ──────────────────────────────────────────────────────
async function saveAnswerToSupabase(user, rec) {
  if (!user) return;
  try {
    // legacy answers table
    await _supabase.from('answers').insert({
      user_id: user.id, question_id: rec.questionId,
      topic: rec.topic, difficulty: rec.difficulty,
      correct: rec.correct, time_ms: rec.timeMs,
      answered_at: new Date().toISOString(),
    });
    // full attempts table (for Analytics + History tabs)
    const { error } = await _supabase.from('attempts').insert({
      user_id:        user.id,
      question_id:    rec.questionId,
      question_title: rec.questionTitle || null,
      question_text:  rec.questionText  || null,
      topic:          rec.topic,
      difficulty:     rec.difficulty,
      selected_answer:rec.selected,
      correct_answer: rec.correctAnswer || null,
      is_correct:     rec.correct,
      time_taken_ms:  rec.timeMs,
      explanation:    rec.explanation   || null,
      tags:           rec.tags          || [],
    });
    if (error) console.warn('attempts insert error:', error.message);
    // streak update
    await _supabase.from('user_stats').upsert({
      user_id: user.id, last_seen: new Date().toISOString(),
      streak_updated: new Date().toDateString(),
    }, { onConflict: 'user_id' });
  } catch(e) { console.warn('saveAnswer exception:', e.message); }
}
